        \ by the System for each day of the required month. Retrieved data shall be\
        \ sorted by date.\nA Liquidity Provider is allowed to perform inquiries on\
        \ interests calculated for any of its LSP.\nAn Owner of a Liquidity Branch\
        \ Funds Balance is allowed to perform inquiries on interests calculated for\
        \ its Branch Funds Balance(s).\nThe Monthly interest information (with Daily\
        \ Accrual Details) will be available for the selected month only after the\
        \ Interest Calculation Process has run, otherwise no data will be provided\
        \ for the month requested, and the following error XA19 will be returned to\
        \ the API User: \u201CThe Interest Calculation has not been calculated for\
        \ the requested month\u201D.\n"
