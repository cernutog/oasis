    OperationDetails:
      properties:
        authorizer:
          allOf:
          - $ref: '#/components/schemas/Authorizer'
          description: The user who authorized/rejected the operation
        confirmer:
          allOf:
          - $ref: '#/components/schemas/Confirmer'
          description: "The user Id of the user who confirmed the operation. Applicable\
            \ only in case of \u201CCritical\u201D operation"
        critical:
          allOf:
          - $ref: '#/components/schemas/Critical'
