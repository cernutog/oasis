  /funding/{senderBic}:
    put:
      description: "The PreFunding request allows the Participant to request for the\
        \ transfer of a specified amount from their DCA account in TIPS to the RT1\
        \ Technical Account in TIPS, thus to their position in the SCT Inst System.\n\
        If the Participant is an LSP whose liquidity management is delegated, the\
        \ request is rejected with ErrorCode XA14.\nIf the Participant is an LP, it\
        \ is allowed to send the PreFunding Request on behalf of the LSPs whose liquidity\
        \ management is responsible for.\nIf the Participant is the Owner of a Branch\
        \ Funds Balance, it is allowed to use this functionality to move the liquidity\
        \ of a not-suspended BIC that is Member of the Branch Funds Balance, from\
        \ the DCA account of the MemberBic in TIPS to the Position of the MemberBic\
        \ in the system.\nIf the Participant is in Technical Isolation, the request\
        \ is rejected with ErrorCode XA23\nAfter receiving the Request for Prefunding\
        \ by the Participant, the system sends a camt.050 message to TIPS with the\
        \ instructions to make the funds available, and afterwards, when the system\
        \ receives the camt.054 message from TIPS, it increases the position of the\
        \ Participant with the required amount.\nThe requests for pre-funding are\
        \ sent from the SCT Inst to TIPS and are asynchronous meaning that the application\
        \ of the funds to the position of the Participant will be subject to a time\
        \ delay.\nThe positive response is a confirmation that the request has been\
        \ sent to TIPS for processing.\n\nPlease, note that the request can be sent\
        \ to SCT Inst only only if the \u201CFREEZE TIPS Exchange Liquidity\u201D\
        \ command has not been issued, otherwise the request will be rejected with\
        \ ErrorCode XA09.\n"
      operationId: funding
      parameters:
      - description: "The BIC of the Participant sending the API Request\n\n **Validation\
          \ Rule(s)** It must be equal to the BIC identified through its certificate\
          \ (ErrorCode XA02).\nIt must be an enabled, r-only or inserted Participant\
          \ (ErrorCode PY01)\nIt the MemberBic is valued but different from the SenderBic,\
          \ the SenderBic must be the Owner of the branchFundsBalanceId (ErrorCode\
          \ XA06)\nThe SenderBic liquidity must be managed by the SenderBic itself\
          \ (ErrorCode XA14)\nThe SenderBic must not be isolated (\u201CTechnical\
          \ Isolation\u201D flag equal to \u201CNo\u201D) (ErrorCode XA23)"
        in: path
        name: senderBic
        required: true
        schema:
          $ref: '#/components/schemas/SenderBic'
