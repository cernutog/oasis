  /defaultPosition/{senderBic}:
    put:
      description: "The Set Default Position request allows the Participant to set\
        \ its default position for one day specific of the week, from Monday to Sunday,\
        \ and for one or more specific LACs of that day. The Participant can set the\
        \ lower, base, upper and reset to base position values for each LAC specified.\
        \ Only the values of the specified LACs will be modified.\nIf the Participant\
        \ is an LSP whose liquidity management is delegated the request is rejected\
        \ with ErrorCode XA14.\nIf the Participant is an LP, it is allowed to send\
        \ the SetDefaultPosition Request on behalf of the LSPs whose liquidity management\
        \ is responsible for.\nThe response contains the EffectiveDate that was calculated\
        \ by the system as the first occurrence for application of the new default\
        \ values. This date is the next TARGET relative to the processing date of\
        \ the request.\nIf the pair Day \u2013 LAC in the request is the next one\
        \ with respect to the current one in the system, the new values are applied\
        \ only if the API Request is received within the \u201CLiquidity Agenda Grace\
        \ Time\u201D system parameter that represents the minimum time interval remaining\
        \ to the end of the current LAC, otherwise the request is rejected.\nThe request\
        \ must anyway be submitted within the \u201CRouting Grace Time\u201D, the\
