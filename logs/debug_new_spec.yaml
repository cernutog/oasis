  /getExceptionPositionCalendar/{senderBic}:
    post:
      description: 'The GetExceptionCalendar request allows the Participant to retrieve
        its own set of values (lower, base,upper and reset to base position) that
        will be applied for each LAC of a specific day in the future (or for the current
        business date). It is possible to inquire the calendar up to one year from
        the current day.

        If the Participant is an LP, it is allowed to send the GetExceptionPositionCalendar
        Request for those LSPs whose liquidity management is responsible for.

        Only the Owner of a Liquidity Branch Funds Balance can inquire the values
        of a Member belonging to its Branch Funds Balance.

        The returned values are the ones that will be really applied by the system,
        if an exception was set for the Business Date, it will be returned in place
        of the default values. If no exception was set for the Business Date, it will
        be returned the default values.

        The response contains the values for the request Business Day.

