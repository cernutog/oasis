components:
  headers:
    X-Request-ID:
      description: Specify an unique end to end tracking request ID. The element will
        be populated by the SWIFT API gateway
      schema:
        type: string
  parameters: {}
  responses: {}
  schemas:
    AOSList:
      example: A01
      maxLength: 30
      pattern: '[0-9A-Z]'
      type: string
    AauList:
      properties:
        aauRt1Asta:
          allOf:
          - $ref: '#/components/schemas/Bic11Only'
          description: BIC11 configured in TIPS as AAU RT1 ASTA for bicCode Participant
        aauRt1AstaEndValidity:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: The End Validity date of the aauRt1Asta
        aauRt1AstaInitValidity:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: The Init Validity date of the aauRt1Asta
        bicCode:
          allOf:
          - $ref: '#/components/schemas/Bic8'
          description: The BIC8 of the Participant that is configuring its aauRt1Asta.
      required:
      - bicCode
      - aauRt1Asta
      - aauRt1AstaInitValidity
      - aauRt1AstaEndValidity
      type: object
    AccCredDebIndic:
      example: DEB
      maxLength: 4
      type: string
    Account:
      example: IT60X0542811101000000123456
      maxLength: 34
      type: string
    ActionType:
      enum:
      - INS
      - UPD
      - RMV
      example: INS
      maxLength: 3
      minLength: 3
      type: string
    ActiveOutNet:
      enum:
      - 1
      - 2
      example: 1
      type: integer
    AddInfo:
      example: Addinitional Information
      maxLength: 140
      type: string
    AdmissionProfile:
      example: CAD
      maxLength: 3
      type: string
    AdmissionProfile1:
      enum:
      - CAD
      - CRD
      example: CAD
      maxLength: 3
      type: string
    AdmissionProfileList:
      example: CAD-INSTCRD-EOLOCAD-IXPB
      maxLength: 80
      type: string
    AlertCode:
      example: '150'
      maxLength: 3
      type: string
    AlertDescription:
      example: USER <USER_ID> for <BIC> Insert Issued
      maxLength: 1000
      type: string
    AlertList:
      properties:
        alertDate:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          description: The date and time of creation of the alert by system (Mandatory
            if the section is present)
        description:
          allOf:
          - $ref: '#/components/schemas/Description'
          description: The description of the alert. (Mandatory if the section is
            present)
        eventType:
          allOf:
          - $ref: '#/components/schemas/EventType'
          description: 'The code of the alert. (Mandatory if the section is present)  The
            possible values are:

            - NORMAL

            - ERROR

            - FATAL

            - WARNING

            - SECURITY'
      required:
      - alertDate
      - description
      - eventType
      type: object
    Amount:
      description: Standard Amount
      example: 9.99
      format: double
      maximum: 999999999999.99
      type: number
    Amount1:
      description: Standard Amount
      example: 9.99
      format: double
      maximum: 1000000000000000.0
      type: number
    Amount2:
      description: Standard Amount
      example: 9.99
      maximum: 999999999999.99
      type: number
    AmountRange:
      properties:
        amountRangeFrom:
          allOf:
          - $ref: '#/components/schemas/Amount'
          description: "The minimum value of the range of the amount\n\n **Validation\
            \ Rule(s)** If present it must be lesser than AmountRangeTo (ErrorCode\
            \ XA05)\nOnly decimal notation is allowed (XA05)"
        amountRangeTo:
          allOf:
          - $ref: '#/components/schemas/Amount'
          description: "The maximum value of the range of the amount\n\n **Validation\
            \ Rule(s)** If present it must be greater than AmountRangeFrom (ErrorCode\
            \ XA05)\nOnly decimal notation is allowed (XA05)"
      type: object
    AmountRange1:
      properties:
        amountRangeFrom:
          allOf:
          - $ref: '#/components/schemas/Amount'
          description: "The minimum value of the range of the amount of the transaction\n\
            \n **Validation Rule(s)** If present it must be lesser than AmountRangeTo\
            \ (ErrorCode XA05)"
        amountRangeTo:
          allOf:
          - $ref: '#/components/schemas/Amount'
          description: "The maximum value of the range of the amount of the transactions\n\
            \n **Validation Rule(s)** If present it must be greater than AmountRangeFrom\
            \ (ErrorCode XA05)"
      type: object
    Aos:
      enum:
      - A01
      - A02
      - A03
      - A04
      - A05
      example: A01
      type: string
    ApDetail:
      properties:
        details:
          description: The following section is present only if the BIC in the APDetails
            has the DPBIC equal to the SenderBIC
          items:
            $ref: '#/components/schemas/Details'
          type: array
        paramHistory:
          $ref: '#/components/schemas/ParamHistory'
      type: object
    ApList:
      properties:
        bicAp:
          allOf:
          - $ref: '#/components/schemas/Bic11'
          description: The BIC of the listed AP (Mandatory if the section is present)
        dpBic:
          allOf:
          - $ref: '#/components/schemas/Bic8'
          description: The Participant BIC of the BICAP (Mandatory if the section
            is present)
        endParticipantValidity:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: The end date of validity of the configured AP (Mandatory if
            the section is present)
        initParticipantValidity:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: The initial date of validity of the configured AP (Mandatory
            if the section is present)
        name:
          allOf:
          - $ref: '#/components/schemas/Name'
          description: It is the name of the AP (Mandatory if the section is present)
        newBic:
          allOf:
          - $ref: '#/components/schemas/Bic11Only'
          description: "The new BIC of the Addressable PSP following a \u201CChange\
            \ BIC\u201D operation."
        newRole:
          allOf:
          - $ref: '#/components/schemas/NewRole'
          description: "The new Role indicator :\n\u2022 \u201CN\u201D \u2013 no \u201C\
            Change Role\u201D operation has been requested;\n\u2022 \u201CY\u201D\
            \ \u2013 the Participant has changed their Role."
        productList:
          description: List of products
          items:
            $ref: '#/components/schemas/ProductList3'
          type: array
        status:
          allOf:
          - $ref: '#/components/schemas/Status5'
          description: The current status of the AP (Mandatory if the section is present)
        submittedAOSeolo:
          allOf:
          - $ref: '#/components/schemas/AOSList'
          description: The AOS associated to EOLO defaultProduct subscribed by the
            Participant.
        submittedAOSinst:
          allOf:
          - $ref: '#/components/schemas/AOSList'
          description: The AOS associated to INST defaultProduct subscribed by the
            Participant.
        tipsUserBic:
          allOf:
          - $ref: '#/components/schemas/Bic11Only'
          description: BIC used for reachability in TIPS through a DCA account
      required:
      - bicAp
      - dpBic
      - name
      - status
      - initParticipantValidity
      - endParticipantValidity
      - tipsUserBic
      - productList
      type: object
    ApOperationDetails:
      properties:
        ProductIds:
          allOf:
          - $ref: '#/components/schemas/ProductIds'
          description: The identifier of the product.
        admissionProfile:
          allOf:
          - $ref: '#/components/schemas/AdmissionProfile1'
          description: "The admission profile (Mandatory if the section is present).\
            \ Possible values are:\n\u201CCAD\u201D - for a Participant or Addressable\
            \ PSP that acts as both Creditor and Debtor Bank\n\u201CCRD\u201D - for\
            \ a Participant or Addressable PSP that only acts as a Creditor only Bank"
        aosListEolo:
          allOf:
          - $ref: '#/components/schemas/AOSList'
          description: The AOS associated to EOLO defaultProduct subscribed by the
            Participant.
        aosListInst:
          allOf:
          - $ref: '#/components/schemas/AOSList'
          description: The AOS associated to INST defaultProduct subscribed by the
            Participant.
        bbPositiveCnf:
          allOf:
          - $ref: '#/components/schemas/BbPositiveCnf1'
          description: It indicates if the Participant asked for confirmation of the
            credited payment amount
        bbTimeoutMgm:
          allOf:
          - $ref: '#/components/schemas/BbTimeoutMgm1'
          description: It indicates if the SCT Inst has to reject the transaction
            that are not confirmed or rejected within the timeout expiration time
            by the Participant, when acting as Beneficiary Bank
        bicCode:
          allOf:
          - $ref: '#/components/schemas/Bic11'
          description: The Bic Code of the AP
        currentPBICCode:
          allOf:
          - $ref: '#/components/schemas/CurrentPBICCode'
          description: 'The Participant under which the APSP is configured at the
            time of the operation.

            The field will be available only in case of ACP operation.'
        endValidityDate:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: "The end validity date assigned by the system in case of \u201C\
            R-Only\u201D operations for AP"
        name:
          allOf:
          - $ref: '#/components/schemas/Name'
          description: The nameof the AP
        participantBic:
          allOf:
          - $ref: '#/components/schemas/Bic8'
          description: The Bic of the Participant
        participantName:
          allOf:
          - $ref: '#/components/schemas/Name'
          description: The name of the Participant
        requesterPBICCode:
          allOf:
          - $ref: '#/components/schemas/RequesterPBICCode'
          description: "The Participant under which the APSP will be configured with\
            \ the \u201CAPSP Change P\u201D operation.\nThe field will be available\
            \ only in case of ACP operation."
        tipsUserBic:
          allOf:
          - $ref: '#/components/schemas/TipsUserBic'
          description: BIC used for reachability in TIPS through a DCA account
      required:
      - bicCode
      - name
      - participantBic
      - participantName
      - admissionProfile
      - bbPositiveCnf
      - bbTimeoutMgm
      - ProductIds
      - aosListInst
      - aosListEolo
      - tipsUserBic
      type: object
    ApspsUnavailability:
      enum:
      - '0'
      - '1'
      example: '0'
      maxLength: 1
      type: string
    Authorizer:
      example: CO0A222
      maxLength: 8
      type: string
    AutomaticLiquidityAdjus:
      enum:
      - '0'
      - '1'
      example: '0'
      type: string
    BbPositiveCnf:
      enum:
      - '0'
      - '1'
      example: '0'
      type: string
    BbPositiveCnf1:
      enum:
      - '0'
      - '1'
      example: '0'
      maxLength: 1
      type: string
    BbTimeoutMgm:
      enum:
      - '0'
      - '1'
      example: '0'
      type: string
    BbTimeoutMgm1:
      enum:
      - '0'
      - '1'
      example: '0'
      maxLength: 1
      type: string
    BbTimeoutMngm:
      enum:
      - '0'
      - '1'
      example: '0'
      type: string
    BeneficiaryAccount:
      example: IT60X0542811101000000123456
      maxLength: 34
      type: string
    BeneficiaryBankPosPaymConf:
      enum:
      - '0'
      - '1'
      example: '0'
      type: string
    BeneficiaryBankTimeoutManag:
      enum:
      - '0'
      - '1'
      example: '0'
      type: string
    BeneficiaryName:
      example: Richard Byrne
      maxLength: 50
      type: string
    Bic11:
      example: IPSDPF21XXX
      maxLength: 11
      minLength: 8
      pattern: '[A-Z0-9]{4,4}[A-Z]{2,2}[A-Z0-9]{2,2}([A-Z0-9]{3,3}){0,1}'
      type: string
    Bic11Only:
      example: IPSDID21XXX
      maxLength: 11
      minLength: 11
      pattern: '[A-Z0-9]{4,4}[A-Z]{2,2}[A-Z0-9]{2,2}([A-Z0-9]{3,3})'
      type: string
    Bic8:
      example: IPSDID21
      maxLength: 8
      minLength: 8
      pattern: '[A-Z0-9]{4,4}[A-Z]{2,2}[A-Z0-9]{2,2}'
      type: string
    Bic81:
      example: IPSDID21
      maxLength: 8
      minLength: 8
      type: string
    BicAp:
      description: Ap Bic
      example: IPSDID21XXX
      type: string
    BicExceptionDayValues:
      properties:
        base:
          allOf:
          - $ref: '#/components/schemas/LacAmount'
          description: The base value amount set in the system for the LSPBic, the
            BusinessDate and LAC (Mandatory if this section is present)
        lac:
          allOf:
          - $ref: '#/components/schemas/LacNumber'
          description: The LAC of the BusinessDate contained in the request (Mandatory
            if this section is present)
        lower:
          allOf:
          - $ref: '#/components/schemas/LacAmount'
          description: The minimum value amount set in the system for the LSPBic,
            the BusinessDate and LAC (Mandatory if this section is present)
        resetToBasePosition:
          allOf:
          - $ref: '#/components/schemas/ResetToBasePosition'
          description: "Whether the \u201CReset to Base Position\u201D flag for the\
            \ relevant LAC is checked/unchecked. The field is present only when set\
            \ to 1=YES"
        sendAccountQueryToTips:
          allOf:
          - $ref: '#/components/schemas/SendAccountQueryToTips'
          description: "Whether the \u201CSend Account Query to TIPS\u201D flag for\
            \ the relevant LAC is checked/unchecked.\nThe field is present only when\
            \ set to: 1=YES"
        upper:
          allOf:
          - $ref: '#/components/schemas/LacAmount'
          description: The maximum value amount set in the system for the LSPBic,
            the BusinessDate and LAC (Mandatory if this section is present)
      required:
      - lac
      - base
      - lower
      - upper
      type: object
    BoolValue:
      enum:
      - '0'
      - '1'
      type: string
    BranchFundsBalanceId:
      example: IPSDID2100001
      maxLength: 13
      minLength: 13
      pattern: '[A-Z0-9]{4,4}[A-Z]{2,2}[A-Z0-9]{5,5}[0-9]{2,2}'
      type: string
    BranchFundsBalancePosition:
      properties:
        amount:
          allOf:
          - $ref: '#/components/schemas/Amount'
          description: If present, the liquidity of the Branch Funds Balance to which
            the SenderBic of the request belongs
        branchFundsBalanceId:
          allOf:
          - $ref: '#/components/schemas/BranchFundsBalanceId'
          description: If present, the branchFundsBalanceId of the Liquidity Branch
            Funds Balance the SenderBic is a member of
      required:
      - branchFundsBalanceId
      - amount
      type: object
    BusinessError:
      example: SC01
      maxLength: 35
      type: string
    CmbLimitAmt:
      example: 10.0
      format: double
      maximum: 1000000000000000.0
      type: number
    CmbStatus:
      example: NTF
      maxLength: 4
      type: string
    CommandItem:
      properties:
        authorizationDate:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: The date of authorization or rejection of the command
        authorizer:
          allOf:
          - $ref: '#/components/schemas/Authorizer'
          description: The authorizer of the event
        commandType:
          allOf:
          - $ref: '#/components/schemas/CommandType1'
          description: The type of the command
        referenceId:
          allOf:
          - $ref: '#/components/schemas/ReferenceId'
          description: The ReferenceId of the request
        requestStatus:
          allOf:
          - $ref: '#/components/schemas/RequestStatus2'
          description: The status of the submitted request
        requestor:
          allOf:
          - $ref: '#/components/schemas/Requestor'
          description: The requestor of the original submitted request
        submissionDate:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          description: The date of the submission of the request
      required:
      - submissionDate
      - referenceId
      - requestStatus
      - commandType
      type: object
    CommandItem1:
      properties:
        authorizationDate:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: The date of authorization of the command
        authorizer:
          allOf:
          - $ref: '#/components/schemas/Authorizer'
          description: 'The authorizer of the event.

            If the deletion is rejected because the command has been already authorized
            = the authorizer that already authorized the command.

            If the deletion is accepted = the authorizer of the deletion request.

            If the deletion is rejected for any other reason (but the command has
            not been already authorized), this field is empty.'
        commandType:
          allOf:
          - $ref: '#/components/schemas/CommandType1'
          description: The type of the command
        referenceId:
          allOf:
          - $ref: '#/components/schemas/ReferenceId'
          description: The ReferenceId of the request
        requestStatus:
          allOf:
          - $ref: '#/components/schemas/RequestStatus2'
          description: "The status of the submitted request, it can contain only\n\
            - \u201CATH\u201D = Authorised if the deletion was accepted and the command\
            \ was deleted\n- \u201CRJT\u201D Rejected by the system if the deletion\
            \ failed and the command was not deleted"
        requestor:
          allOf:
          - $ref: '#/components/schemas/Requestor'
          description: The requestor of the original submitted request
        submissionDate:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          description: The date of the submission of the request
      required:
      - submissionDate
      - referenceId
      - requestStatus
      - commandType
      type: object
    CommandList:
      properties:
        authorizationDate:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: The date of the authorization or rejection of the request
        authorizer:
          allOf:
          - $ref: '#/components/schemas/Authorizer'
          description: The authorizer of the change request
        commandType:
          allOf:
          - $ref: '#/components/schemas/CommandType'
          description: The type of the command (Mandatory if the section is present)
        referenceId:
          allOf:
          - $ref: '#/components/schemas/ReferenceId'
          description: The ReferenceId of the request (Mandatory if the section is
            present)
        requestStatus:
          allOf:
          - $ref: '#/components/schemas/RequestStatus2'
          description: The status of the submitted request (Mandatory if the section
            is present)
        requestor:
          allOf:
          - $ref: '#/components/schemas/Requestor1'
          description: The requestor of the original submitted request
        submissionDate:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          description: The date of the submission of the request  (Mandatory if the
            section is present)
      required:
      - submissionDate
      - referenceId
      - requestStatus
      - commandType
      type: object
    CommandType:
      enum:
      - INS
      - RMV
      - UPD
      - ROF
      - RAL
      - GBA
      - BMI
      - BMA
      - BMR
      - RRE
      - CDN
      - PSQ
      - GOL
      - LAG
      - LCA
      - RLI
      - PFL
      - LTR
      - ALL
      example: INS
      maxLength: 3
      type: string
    CommandType1:
      example: INS
      maxLength: 3
      type: string
    Compression:
      enum:
      - '0'
      - '1'
      example: '0'
      type: string
    Compression1:
      enum:
      - '0'
      - '1'
      example: '0'
      maxLength: 1
      type: string
    Confirmer:
      example: ID403821
      maxLength: 8
      type: string
    CredSettMethod:
      enum:
      - LQPS
      - RT1A
      - TDCA
      example: LQPS
      type: string
    CredSettMethod1:
      enum:
      - LQPS
      - RT1A
      - TDCA
      example: LQPS
      maxLength: 4
      type: string
    CreditDebitIndicator:
      enum:
      - CRDT
      - DBIT
      example: CRDT
      type: string
    CreditorSettlementMethod:
      enum:
      - LQPS
      - RT1A
      - TDCS
      example: LQPS
      maxLength: 4
      type: string
    Criteria:
      properties:
        branchFundsBalanceId:
          allOf:
          - $ref: '#/components/schemas/BranchFundsBalanceId'
          description: "The id of the branchFundsBalance to which the MemberBic belongs.\n\
            \n **Validation Rule(s)** Mandatory if the MemberBic is present (ErrorCode\
            \ XA04 )"
        lspBic:
          allOf:
          - $ref: '#/components/schemas/Bic8'
          description: "The BIC of an LSP of the SenderBic. It can be present in addition\
            \ to the MemberBic.\n\n **Validation Rule(s)** If the LSPBic is not associated\
            \ with an LSP whose liquidity management is configured to be performed\
            \ by a Liquidity Provider on its behalf and/or the SenderBic is not corresponding\
            \ to such LP, the request is rejected (ErrorCode XA14)"
        memberBic:
          allOf:
          - $ref: '#/components/schemas/Bic8'
          description: "The BIC of the Member for which it is requested the set of\
            \ default values. If not present the default values of the SenderBic are\
            \ returned.\n\n **Validation Rule(s)** Mandatory if the branchFundsBalanceId\
            \ is present (ErrorCode XA04)\nThe MemberBic must belong to the specified\
            \ branchFundsBalanceId (ErrorCode XA06)"
      type: object
    Criteria1:
      properties:
        branchFundsBalanceId:
          allOf:
          - $ref: '#/components/schemas/BranchFundsBalanceId'
          description: "The id of the branchFundsBalance to which the Participant\
            \ identified by the MemberBic belongs.\n\n **Validation Rule(s)** Mandatory\
            \ if MemberBic is present (ErrorCode XA04)"
        businessDate:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: "The day of the year to which the values are requested\n\n\
            \ **Validation Rule(s)** The date must be the present date or a future\
            \ date no further than one year from the current date (ErrorCode DT01)"
        lspBic:
          allOf:
          - $ref: '#/components/schemas/Bic8'
          description: "The BIC of an LSP of the SenderBic. It can be present in addition\
            \ to the MemberBIC.\n\n **Validation Rule(s)** The LSPBic liquidity must\
            \ be managed by its LP, and its LP must be equal to the SenderBic (ErrorCode\
            \ XA14)"
        memberBic:
          allOf:
          - $ref: '#/components/schemas/Bic8'
          description: "The BIC of the Member for which it is requested the set of\
            \ default values\n\n **Validation Rule(s)** Mandatory if the branchFundsBalanceId\
            \ is present (ErrorCode XA04)\nThe MemberBic must belong to the specified\
            \ branchFundsBalanceId (ErrorCode XA06)"
      required:
      - businessDate
      type: object
    Criteria10:
      properties:
        automaticLiquidityAdjustment:
          allOf:
          - $ref: '#/components/schemas/LiquidityAutomaticAdjustment'
          description: "It indicates whether it is required or not to have automatic\
            \ liquidity adjustments at the end of each LAC.\n\n **Validation Rule(s)**\
            \ Allowed values:\n- 0:Automatic Adjustment not activated\n- 1: Automatic\
            \ Adjustment activated\n(schema validation)."
        bbPositiveCnf:
          allOf:
          - $ref: '#/components/schemas/BbPositiveCnf'
          description: "It indicates if the Participant requires to receive the opftional\
            \ positive confirmation\n\n **Validation Rule(s)** It can contain 0 (not\
            \ required) or 1 (required) - (schema validation)"
        bbTimeoutMgm:
          allOf:
          - $ref: '#/components/schemas/BbTimeoutMgm'
          description: Whether the SCT Inst has to reject the transaction that are
            not confirmed or re-jected within the timeout expiration time by the Participant,
            when acting as Beneficiary PSP
        compression:
          allOf:
          - $ref: '#/components/schemas/Compression'
          description: "It indicates if the Participant asked for the compression\
            \ of the files received\n\n **Validation Rule(s)** It can contain 0 (not\
            \ required) or 1 (required). Schema validation.\nIf the field is set to\
            \ \u201C1\u201D and the Network set is not SWIFT: error code XA07."
        drrReq:
          allOf:
          - $ref: '#/components/schemas/DrrReq'
          description: "It indicates if the Participant asked for receive DRR\n\n\
            \ **Validation Rule(s)** It can contain 0 (not required) or 1 (required)\
            \ - (schema validation)"
        effectiveDate:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: "It indicates the future starting date for the planned changes\n\
            \n **Validation Rule(s)** For Critical parameter:\n\u2022 if onMonday\
            \ W1 the first effective date will be Tuesday W3\n\u2022 if between Tuesday\
            \ and Sunday W1 the first effective date will be the Tuesday W4\nFor Not\
            \ Critical parameter:\n\u2022 the effective date must be grater than the\
            \ current business date, , with respect to the End Validity Date configured\
            \ for the Participant.\n(ErrorCode DT01)\nAnother configuration with the\
            \ same effective date is already existing (errorCode XA22)"
        filePrimaryNetId:
          allOf:
          - $ref: '#/components/schemas/FilePrimaryNetId'
          description: "The primary network identification\nCan be the same provider\
            \ of Secondary Network\n\n **Validation Rule(s)** It can contain:\n- \u201C\
            EAS\u201D for SIANet\n- \u201CEBX\u201D for EBICS\n- \u201CSWF\u201D Swiftnet\
            \ RT Single Request Type\n-\u201CSWA Swiftnet RT Multiple Request Type\n\
            -\u201CSWS\u201D Swiftnet S&F Single Request Type\n-\u201CSWM\u201D Swiftnet\
            \ S&F Multiple Request Type (ErrorCode XA03)"
        fileSecondaryNetId:
          allOf:
          - $ref: '#/components/schemas/FileSecondaryNetId'
          description: "The secondary network identification\nCan be the same provider\
            \ of Primary Network\n\n **Validation Rule(s)** It can contain:\n- \u201C\
            EAS\u201D for SIANet\n- \u201CEBX\u201D for EBICS\n- \u201CSWF\u201D Swiftnet\
            \ RT Single Request Type\n-\u201CSWA Swiftnet RT Multiple Request Type\n\
            -\u201CSWS\u201D Swiftnet S&F Single Request Type\n-\u201CSWM\u201D Swiftnet\
            \ S&F Multiple Request Type (ErrorCode XA03)"
        intraLACAuthAdjst:
          allOf:
          - $ref: '#/components/schemas/LiquidityAutomaticAdjustment'
          description: "It indicates whether it is required or not to have intraLAC\
            \ automatic liquidity adjustments\n\n **Validation Rule(s)** Allowed values:\n\
            0: Intra-LAC Automatic\n    Adjustment not activated\n1: Intra-LAC Automatic\n\
            \    Adjustment activated\nParameter can be set to \u201C1\u201D only\
            \ if parameter \u201CautomaticLiquidity Adjustment\u201D is set to \u201C\
            1\u201D, otherwise XA17"
        liquidityManagement:
          allOf:
          - $ref: '#/components/schemas/LiquidityManagement'
          description: "The liquidity management of the SenderBic\n\n **Validation\
            \ Rule(s)** \u2022 It can contain \u201C0\u201D or \u201C1\u201D (schema\
            \ validation)\n\u2022 If the SenderBic is an LP it must be \u201C0\u201D\
            \ (\u201CBy Participant itself\u201D) (ErrorCode XA13)\nIf it contains\
            \ \u201C1\u201D (\u201CBy LP on behalf\u201D) the LP of the SenderBic\
            \ must be configured as an \u201Cenabled\u201D Participant at the EffectiveDate\
            \ contained in the request (ErrorCode XA16)"
        maxFileSize:
          allOf:
          - $ref: '#/components/schemas/MaxFileSize'
          description: "The maximum size of a file that is sent by the CS to the DP\n\
            \n **Validation Rule(s)** The value must be in the range included between\
            \ the default values set in the system for the Minimum file size and the\
            \ Maximum file size.\n(ErrorCode XA15)"
        msrReq:
          allOf:
          - $ref: '#/components/schemas/MsrReq'
          description: "It indicates if the Participant asked for receive MSR\n\n\
            \ **Validation Rule(s)** It can contain 0 (not required) or 1 (required)\
            \ - (schema validation)"
        name:
          allOf:
          - $ref: '#/components/schemas/Name'
          description: It is the name of the DP
        primaryFileIntRecNetId:
          allOf:
          - $ref: '#/components/schemas/PrimaryFileIntRecNetId'
          description: 'The primary receiving network address for the File Interface
            from SCT Inst

            Can be the same provider of Secondary Network'
        productList:
          description: ' **Validation Rule(s)** The following section can be present
            or not. If the Participant fills it, it must be repeated as many times
            as the products to be changed: inserted, updated or removed.

            This section must be formatted with squared brackets.

            At least one of the optional field below has to be present'
          items:
            $ref: '#/components/schemas/ProductList2'
          type: array
        psrReq:
          allOf:
          - $ref: '#/components/schemas/PsrReq'
          description: "It indicates if the Participant asked for receive PSR\n\n\
            \ **Validation Rule(s)** It can contain 0 (not required) or 1 (required)\
            \ - (schema validation)"
        rsfReq:
          allOf:
          - $ref: '#/components/schemas/RsfReq'
          description: "It indicates if the Participant asked for receive RSF\n\n\
            \ **Validation Rule(s)** It can contain 0 (not required) or 1 (required)\
            \ - (schema validation)"
        secondaryFileIntRecNetId:
          allOf:
          - $ref: '#/components/schemas/SecondaryFileIntRecNetId'
          description: 'The secondary receiving network address for the File Interface
            from SCT Inst

            Can be the same provider of Primary Network'
        submittedAOSeolo:
          allOf:
          - $ref: '#/components/schemas/AOSList'
          description: "The AOS associated to EOLO defaultProduct subscribed by the\
            \ Participant: the content of this field will replace the AOS saved in\
            \ the system master data\n\n **Validation Rule(s)** It can contain only\
            \ a set of strings accepted by the system.\nThe system will check that\
            \ all AOS selected are allowed to be associated with Products subscribed\n\
            (ErrorCode XA03)"
        submittedAOSinst:
          allOf:
          - $ref: '#/components/schemas/AOSList'
          description: "The AOS associated to INST defaultProduct subscribed by the\
            \ Participant: the content of this field will replace the AOS saved in\
            \ the system master data\n\n **Validation Rule(s)** It can contain only\
            \ a set of strings accepted by the system.\nThe system will check that\
            \ all AOS selected are allowed to be associated with Products subscribed\n\
            (ErrorCode XA03)"
        technicalBic:
          allOf:
          - $ref: '#/components/schemas/TechnicalBic'
          description: "It indicates if the BIC is a technical one (1) or not (0)\n\
            \n **Validation Rule(s)** It can contain 0 or 1 (schema validation)"
        tipsAccountOwnerBic:
          allOf:
          - $ref: '#/components/schemas/Bic11Only'
          description: The BIC(11) by which the Direct participant will be known to
            the ESM for settlement purpose
        tipsAdherence:
          allOf:
          - $ref: '#/components/schemas/TipsAdherence'
          description: "It indicates if the Participant is allowed to settle transactions\
            \ in TIPS through its TIPS DAC account.\n\n **Validation Rule(s)** It\
            \ can assume the values:\n- \u201C1\u201D = YES\n- \u201C0\u201D = NO\n\
            (schema validation)"
        tipsDcaAccountId:
          allOf:
          - $ref: '#/components/schemas/TipsDcaAccountId'
          description: TIPS Account number
        tipsNetworkOption:
          allOf:
          - $ref: '#/components/schemas/TipsNetworkOption1'
          description: "It indicates the network identification for the Participant\n\
            \n **Validation Rule(s)** It can contain:\n- \u201CEAS\u201D for SIANet\
            \ ,\n- \u201CSWI\u201D for Swift Real Time\n(ErrorCode XA03)"
        tipsUserBic:
          allOf:
          - $ref: '#/components/schemas/Bic11Only'
          description: BIC used for reachability in TIPS through a DCA account
        transactionalPrimaryNetId:
          allOf:
          - $ref: '#/components/schemas/TransactionalPrimaryNetId1'
          description: "The primary network identification\nCan be the same provider\
            \ of Secondary Network\n\n **Validation Rule(s)** It can contain:\n- \u201C\
            EAS\u201D for SIANet ,\n- \u201CEBX\u201D for EBICS,\n- \u201CSWI\u201D\
            \ for Swift Real Time\n(any other available Network will be added) (ErrorCode\
            \ XA03)"
        transactionalSecondaryNetId:
          allOf:
          - $ref: '#/components/schemas/TransactionalSecondaryNetId1'
          description: "The secondary network identification\nCan be the same provider\
            \ of Primary Network\n\n **Validation Rule(s)** It can contain:\n- \u201C\
            EAS\u201D for SIANet ,\n- \u201CEBX\u201D for EBICS.\n- \u201CSWI\u201D\
            \ for Swift Real Time\nIf present, it must be different from TransactionalPrimaryNetId\n\
            (any other available Network will be added) (ErrorCode XA03)\nIf the secondary\
            \ network was not already present in the Participant configuration, the\
            \ system checks the presence of the tags SecondaryRecNetId and SecondarySendNetId\
            \ for each Product subscribed by the Participant\n(ErrorCode XA04)"
      required:
      - effectiveDate
      type: object
    Criteria11:
      properties:
        aos:
          allOf:
          - $ref: '#/components/schemas/Aos'
          description: "One of the AOS subscribed by the AP\n\n **Validation Rule(s)**\
            \ It can contain only a string like \u201CA\u201D followed by a number\
            \ from 01 to 10 , according to the number of AOS defined in the system\
            \ (ErrorCode XA03)"
        bicAp:
          allOf:
          - $ref: '#/components/schemas/Bic11Only'
          description: The BIC of the searched AP
        dpBic:
          allOf:
          - $ref: '#/components/schemas/Bic8'
          description: The Participant BIC of the BICAP
        productId:
          allOf:
          - $ref: '#/components/schemas/ProductId'
          description: "Field used to filter APSP for configured defaultProduct\n\n\
            \ **Validation Rule(s)** Product must be a defaultProduct defined in the\
            \ system (ErrorCode XA03)\nThe SenderBIC must be configured for the chosen\
            \ product.\n(ErrorCode XA13)"
        status:
          allOf:
          - $ref: '#/components/schemas/Status5'
          description: "The current status of the AP\n\n **Validation Rule(s)** Must\
            \ be one of the available status in the system (ErrorCode XA03). The possible\
            \ values are:\n- \u201CALL\u201D All statuses\n- \u201CENB\u201D Enabled\n\
            - \u201CSUS\u201D Suspended\n- \u201CDIS\u201D Disabled\n- \u201CCNG\u201D\
            \ Changed\n- \u201CINS\u201D Inserted\n- \u201CRNL\u201D R-Only"
      type: object
    Criteria12:
      properties:
        bbPositiveCnf:
          allOf:
          - $ref: '#/components/schemas/BeneficiaryBankPosPaymConf'
          description: "Whether the AP, when acting as Beneficiary PSP, is configured\
            \ to receive a final con-firmation from SCT Inst stating the final status\
            \ of the IP transaction\n\n **Validation Rule(s)** It can contain 0 (not\
            \ required) or 1 (required) - (schema validation)"
        bbTimeoutMgm:
          allOf:
          - $ref: '#/components/schemas/BeneficiaryBankTimeoutManag'
          description: "Whether the SCT Inst has to reject the transaction that are\
            \ not confirmed or re-jected within the timeout expiration time by the\
            \ Participant, when acting as Beneficiary PSP\n\n **Validation Rule(s)**\
            \ It can contain 0 (not required) or 1 (required) - (schema validation)"
        bicAp:
          allOf:
          - $ref: '#/components/schemas/Bic11Only'
          description: The BIC of the inquired AP
        effectiveDate:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: "It indicates the future starting date for the planned changes\n\
            \n **Validation Rule(s)** A date >= P Initial Validity Date between tomorrow\
            \ and the EndValidityDate of the Participant (ErrorCode DT01)"
        name:
          allOf:
          - $ref: '#/components/schemas/Name'
          description: It is the name of the AP
        productList:
          description: List of products
          items:
            $ref: '#/components/schemas/ProductList5'
          type: array
        submittedAOSeolo:
          allOf:
          - $ref: '#/components/schemas/AOSList'
          description: "The AOS associated to EOLO defaultProduct subscribed by the\
            \ AP: the content of this field will replace the AOS saved in the system\
            \ master data\n\n **Validation Rule(s)** It can contain only a set of\
            \ strings accepted by the system.\nThe system will check that all AOS\
            \ selected are allowed to be associated with Products subscribed\n(ErrorCode\
            \ XA03)"
        submittedAOSinst:
          allOf:
          - $ref: '#/components/schemas/AOSList'
          description: "The AOS associated to INST defaultProduct subscribed by the\
            \ AP: the content of this field will replace the AOS saved in the system\
            \ master data\n\n **Validation Rule(s)** It can contain only a set of\
            \ strings accepted by the system.\nThe system will check that all AOS\
            \ selected are allowed to be associated with Products subscribed\n(ErrorCode\
            \ XA03)"
        tipsUserBic:
          allOf:
          - $ref: '#/components/schemas/Bic11Only'
          description: BIC used for reachability in TIPS through a DCA account
      required:
      - bicAp
      - effectiveDate
      type: object
    Criteria13:
      properties:
        bicAp:
          allOf:
          - $ref: '#/components/schemas/Bic11Only'
          description: The BIC of the AP
        effectiveDate:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: "It indicates the future starting date for the planned changes\n\
            \n **Validation Rule(s)** For Critical parameter:\n\u2022 if on Monday\
            \ W1 the first effective date will be Tuesday W3\n\u2022 if between Tuesday\
            \ and Sunday W1 the first effective date will be Tuesday of the W4\n(ErrorCode\
            \ DT01)\n\u2022 it must be greater than Current Date + 2 calendar days\n\
            (ErrorCode DT01)"
        effectiveEndValidityDate:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: "Calendar date starting from this date the APSP will be in\
            \ DISABLED status.\nThe removal can be performed on a non-target day\n\
            \n **Validation Rule(s)** Valid in case of R-Only status\nIt must be:\n\
            \u2022 >= effectiveDate\n\u2022 <= effectiveDate + \u201CMax R-Only Period\u201D\
            \n\u2022 mandatory\n(ErrorCode DT01)"
        newStatus:
          allOf:
          - $ref: '#/components/schemas/NewStatus'
          description: "The new status of the AP that can be Disabled or R-only\n\n\
            \ **Validation Rule(s)** It can contain only:\n- \u201CDIS\u201D if the\
            \ AP has \u201CRNL\u201D status and is going to become Disabled\n- \u201C\
            RNL\u201D if the AP has \u201CENB\u201D (enabled) status and is going\
            \ to become R-only.\n(Error Code PY01)"
      required:
      - bicAp
      - newStatus
      - effectiveDate
      type: object
    Criteria14:
      properties:
        bbPositiveCnf:
          allOf:
          - $ref: '#/components/schemas/BbPositiveCnf'
          description: "It indicates if the AP asked for confirmation of the credited\
            \ payment amount (Mandatory if the section is present)\n\n **Validation\
            \ Rule(s)** It can contain 0 (not required) or 1 (required) - (schema\
            \ validation)"
        bbTimeoutMgm:
          allOf:
          - $ref: '#/components/schemas/BbTimeoutMngm'
          description: "Whether the SCT Inst has to reject the transaction that are\
            \ not confirmed or re-jected within the timeout expiration time by the\
            \ Participant, when acting as Beneficiary PSP\n\n **Validation Rule(s)**\
            \ It can contain 0 (not required) or 1 (required) - (schema validation)"
        bicAp:
          allOf:
          - $ref: '#/components/schemas/Bic11Only'
          description: "The BIC of the new AP\n\n **Validation Rule(s)** If already\
            \ present in the system it must have \u2018disabled\u2019 status with\
            \ respect to the InitValidityDate(ErrorCode PY01)"
        endParticipantValidity:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: "The end date of validity of the AP\n\n **Validation Rule(s)**\
            \ It must be equal to the fixed value \u20189999-12-31\u2019 (ErrorCode\
            \ DT01)"
        initParticipantValidity:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: "The init date of validity of the AP\n\n **Validation Rule(s)**\
            \ It must be a future date (ErrorCode DT01) and:\no :if on Monday W1 the\
            \ first effective date will be Tuesday W3\no if between Tuesday and Sunday\
            \ W1 the first effective date will be Tuesday W4\no must be  >= P Initial\
            \ Validity Date"
        name:
          allOf:
          - $ref: '#/components/schemas/Name'
          description: It is the name of the AP
        productList:
          description: List of products
          items:
            $ref: '#/components/schemas/ProductList6'
          type: array
        submittedAOSeolo:
          allOf:
          - $ref: '#/components/schemas/AOSList'
          description: "The AOS associated to EOLO defaultProduct subscribed by the\
            \ AP.\n\n **Validation Rule(s)** It can contain only a set of strings\
            \ accepted by the system.\nThe system will check that all AOS selected\
            \ are allowed to be associated with Products subscribed\n(ErrorCode XA03)"
        submittedAOSinst:
          allOf:
          - $ref: '#/components/schemas/AOSList'
          description: "The AOS associated to INST defaultProduct subscribed by the\
            \ AP.\n\n **Validation Rule(s)** It can contain only a set of strings\
            \ accepted by the system.\nThe system will check that all AOS selected\
            \ are allowed to be associated with Products subscribed\n(ErrorCode XA03)"
        tipsUserBic:
          allOf:
          - $ref: '#/components/schemas/Bic11Only'
          description: "BIC used for reachability in TIPS through a DCA account\n\n\
            \ **Validation Rule(s)** Two different Participant or APSP cannot have\
            \ same TIPS User BIC (ErrorCode XA13)"
      required:
      - bicAp
      - name
      - tipsUserBic
      - initParticipantValidity
      - endParticipantValidity
      - productList
      type: object
    Criteria15:
      properties:
        apspsUnavailability:
          allOf:
          - $ref: '#/components/schemas/ApspsUnavailability'
          description: "This flag allow Participant to communicate the unavailability\
            \ for itself and for all its APSPs\n\nIf not present or \u201C0\u201D\
            \ then the unavailability impact only the unavailableBic.\n\nIf present\
            \ and \u201C1\u201D the unavailability impact both unavailableBic and\
            \ all connected APSP(s)\n\n **Validation Rule(s)** XT33:must be present\
            \ if the unavailableBic is a Participant BIC8 and must be equal to the\
            \ allowed values"
        endDateTime:
          allOf:
          - $ref: '#/components/schemas/ZonedDateTime'
          description: "End date and time of unavailability.\n\n **Validation Rule(s)**\
            \ It must always be greater than the current time (ErrorCode DT01)\nMust\
            \ be an ISO Date Time with time zone.\nField used for duplicate checking\
            \ (error code AM05)"
        eventCode:
          allOf:
          - $ref: '#/components/schemas/EventCode'
          description: "Type of operation requested:\n- \"INS\" for new un-availability\
            \ period insertion\n- \"DEL\" for cancellation of un-availability period\
            \ previously communicated\n\n **Validation Rule(s)** Field used for duplicate\
            \ checking (error code AM05)"
        eventDescription:
          allOf:
          - $ref: '#/components/schemas/EventDescription'
          description: "Free text to describe the event that causes the unavailability.\n\
            \n **Validation Rule(s)** UTF-8 character set admitted.\nXT33: it must\
            \ be equal to the allowed format"
        idOfUnavailableParty:
          allOf:
          - $ref: '#/components/schemas/IdOfUnavailableParty'
          description: ID of Unavailable Party as a free text
        messageId:
          allOf:
          - $ref: '#/components/schemas/MessageId2'
          description: "The message ID of the ami.004 message. The stand format includes\
            \ following fields:\n\u2022 BIC8 of sender Participant\n\u2022 Current\
            \ timestamp\nExample:\n12345678aaaa-mm-ddThh:mm:ss:ssss\n\n **Validation\
            \ Rule(s)** Field used for duplicate checking (error code AM05)"
        productsUnavailable:
          allOf:
          - $ref: '#/components/schemas/ProductsUnavailable'
          description: "List of Product(s) impacted by the unavailability\nIf all\
            \ products are unavailable, the list must include all configured products\
            \ for the unavailableBic\n\n **Validation Rule(s)** XT33: at least one\
            \ of the products configured in the system for the unavailableBic must\
            \ be indicated."
        startDateTime:
          allOf:
          - $ref: '#/components/schemas/ZonedDateTime'
          description: "Start date and time of unavailability.\n\n **Validation Rule(s)**\
            \ It must always be minor than the \u201CEnd date and time\u201D (ErrorCode\
            \ DT01)\nMust be an ISO Date Time with time zone.\nField used for duplicate\
            \ checking (error code AM05)"
        unavailableBic:
          allOf:
          - $ref: '#/components/schemas/Bic11'
          description: "BIC of the Participant or APSP that is going to be unavailable.\n\
            \n **Validation Rule(s)** It must be equal to the BIC of the sender. If\
            \ different, it must be one APSP of the SenderBic. (ErrorCode XA06).\n\
            Field used for duplicate checking (error code AM05)"
      required:
      - eventCode
      - unavailableBic
      - messageId
      - startDateTime
      - endDateTime
      - productsUnavailable
      type: object
    Criteria16:
      properties:
        fromTIPS:
          allOf:
          - $ref: '#/components/schemas/ApspsUnavailability'
          description: "To be chosen if user wants to search between admi.004 from\
            \ TIPS\n\n **Validation Rule(s)** In choice with unavailableBIC, it can\u2019\
            t be that both parameter are included into the API:\nWhen \u201CfromTIPS\u201D\
            \ is set to \u201C1\u201D research will be performed only between CS admi.004\
            \ received from TIPS and \u201CBIC code\u201D is not considered.\nWhen\
            \ \u201CfromTIPS\u201D is set to \u201C0\u201D the \u201CunavailableBic\u201D\
            \ can be leave empty or set to a specific \u201CBIC code\u201D and research\
            \ will be performed both CS admi.004 (triggered by an admi.004 received\
            \ from TIPS) and admi.004 received from RT1 Participants."
        unavailableBic:
          allOf:
          - $ref: '#/components/schemas/Bic11'
          description: "BIC of the Participant or APSP that could be unavailable.\n\
            \n **Validation Rule(s)** It must be one of the following:\n- Blank: the\
            \ response shall provide all the BIC present in the admi.004 directory.\n\
            - A direct Participant BIC that is enabled, suspended or r-only in the\
            \ CS repository on the current calendar date (ErrorCode PY01).\n- An APSP\
            \ BIC that is enabled, suspended or r-only in the CS repository on the\
            \ current calendar date (ErrorCode PY01).\nThe list shall be ordered in\
            \ alphabetic order."
      type: object
    Criteria17:
      properties:
        authorizer:
          allOf:
          - $ref: '#/components/schemas/Authorizer'
          description: The user who authorized/rejected the operation
        confirmer:
          allOf:
          - $ref: '#/components/schemas/Confirmer'
          description: "The user Id of the user who confirmed the operation.\n\n **Validation\
            \ Rule(s)** Applicable only in case of \u201CCritical\u201D operation"
        critical:
          allOf:
          - $ref: '#/components/schemas/Critical'
          description: This flag indicates if the operation is critical or not-critical
        dateOfConfirmFrom:
          allOf:
          - $ref: '#/components/schemas/DateOfConfirmFrom'
          description: "The date of the confirmation by Participant User. (The minimum\
            \ value of the range of the date)\n\n **Validation Rule(s)** Applicable\
            \ only in case of \u201CCritical\u201D operation\nIf present it must be\
            \ lesser than dateOfConfirmTo (ErrorCode DT01)"
        dateOfConfirmTo:
          allOf:
          - $ref: '#/components/schemas/DateOfConfirmTo'
          description: "The date of the confirmation by Participant User. (The maximum\
            \ value of the range of the date)\n\n **Validation Rule(s)** Applicable\
            \ only in case of \u201CCritical\u201D operation\nIf present it must be\
            \ greater than dateOfConfirmFrom (ErrorCode DT01)"
        dateOfExecutionFrom:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: "The minimum value of the range of the date\n\n **Validation\
            \ Rule(s)** If present it must be lesser than dateOfRequestTo (ErrorCode\
            \ DT01)"
        dateOfExecutionTo:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: "The maximum value of the range of the date\n\n **Validation\
            \ Rule(s)** If present it must be greater than dateOfRequestTo (ErrorCode\
            \ DT01)"
        dateOfRequestFrom:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: "The minimum value of the range of the date\n\n **Validation\
            \ Rule(s)** If present it must be lesser than dateOfRequestTo (ErrorCode\
            \ DT01)"
        dateOfRequestTo:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: "The maximum value of the range of the date\n\n **Validation\
            \ Rule(s)** If present it must be greater than dateOfRequestTo (ErrorCode\
            \ DT01)"
        operationType:
          allOf:
          - $ref: '#/components/schemas/OperationType1'
          description: "Type of the operation\n\n **Validation Rule(s)** Values allowed:\n\
            \u201CINS\u201D Inserted\n\u201CREM\u201D Removed\n\u201CUPD\u201D Updated\n\
            \u201CMIN\u201D Massive Insert\n\u201CRNL\u201D R-only\n\"MOD\" Amend\n\
            \"REV\" Revoke\n\u201CACP\u201D APSP Change P\n(schema validation)"
        referenceId:
          allOf:
          - $ref: '#/components/schemas/ReferenceId'
          description: Unique reference ID of the operation
