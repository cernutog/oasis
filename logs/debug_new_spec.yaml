  /listInstructionsFundingDefundingTIPS/{senderBic}:
    post:
      description: "The ListInstructionsFundingDefunding request returns a list of\
        \ all instructions present in the SCT Inst for a specific BIC and is sorted\
        \ by Date.\nIt is possible to fill one or more fields as filtering criteria:\
        \ in that case, the API Response returns the full set of rows corresponding\
        \ to the filter criteria.\nIf the Participant is an LP, it is allowed to inquire\
        \ the instructions of the LSPs whose liquidity management is responsible for.\n\
        If the Participant is the Owner of a Branch Funds Balance, it is allowed to\
        \ inquire the instructions of another BIC that is a Member of the Branch Funds\
        \ Balance that it owns.\nThe configuration of LSP and Branch Funds Balances\
        \ taken into account for checks by the system is the one present at the moment\
        \ in which the API Request is received: no restriction is applied to old stored\
        \ instructions for which a different configuration was active.\nIf all the\
        \ checks pass, but the system does not find any instruction related to the\
        \ filtering criteria of the Request, the reason Code 204 \u2013 No Record\
        \ Found is returned.\nThe resulting list shall contain a maximum of 1000 rows\
        \ satisfying the criteria, in the case that the result has more than 1000\
        \ matching instructions, the response will contain an offset. By resubmitting\
        \ the same request with a different offset value the Participant can retrieve\
        \ all matching instructions"
      operationId: listInstructionsFundingDefunding
      parameters:
      - description: "The BIC of the Participant sending the API Request\n\n **Validation\
          \ Rule(s)** Must be equal to the BIC of the Participants certificate (ErrorCode\
