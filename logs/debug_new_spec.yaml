        camt005ReceFromPartDtTm:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          description: Date and Time indicating when the Participant transmitted the
            Payment Status Query message to RT1.
        camt006RecDtTmFromTips:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          description: Date and Time indicating when the Payment Status Query Response
            has been received from TIPS
        camt025ReceDtTmFromTIPS:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          description: Date and Time indicating when the Receipt has been received
            from TIPS
        camt050ReFromPartDtTm:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          description: Date and Time indicating when the Participant transmitted the
            LTO via message interface to RT1
        camt054ReceDtTmFromTIPS:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          description: Date and Time indicating when the Debit/Credit Notification
            has been received from TIPS
        cmbHeadroom:
          allOf:
          - $ref: '#/components/schemas/CmbLimitAmt'
          description: 'Dynamic headroom of the CMB limit.

            The field field is present if message type is Return Account (camt.004)'
        cmbLimitAmt:
          allOf:
          - $ref: '#/components/schemas/CmbLimitAmt'
          description: 'Limit amount of the CMB for the counterparty.

            The field field is present if message type is Return Account (camt.004)'
        cmbStatus:
          allOf:
          - $ref: '#/components/schemas/CmbStatus'
          description: 'Specifies the status of the CMB.

            The field field is present if message type is Return Account (camt.004)'
        confReceptTimestamp:
          allOf:
          - $ref: '#/components/schemas/Time'
          description: "The Confirmation Reception from the Beneficiary Timestamp.\n\
            Present in case the Payment Status Code in the response includes \u201C\
            BRCV\u201D.\nThis field is present if the message type is Payment Status\
            \ Query Response (camt.006)"
        confToOrigTimestamp:
          allOf:
          - $ref: '#/components/schemas/Time'
          description: "Confirmation to the Originator Timestamp.\nPresent in case\
            \ the Payment Status Code in the response includes \u201COFWD\u201D.\n\
            This field is present if the message type is Payment Status Query Response\
            \ (camt.006)"
        credAccOwnBic:
          allOf:
          - $ref: '#/components/schemas/Bic11Only'
          description: 'BIC of Financial Institution owning the account to be credited.

            The field field is present if message type is LTO (camt.050)'
        creditDebitIndicator:
          allOf:
          - $ref: '#/components/schemas/CreditDebitIndicator'
          description: "Credit Debit Indicator\nSpecifies if the Amount has been credited\
            \ or debited. For credit movements, this field will be \u201CCRDT\u201D\
            . For debit movements this field will be \u201CDBIT\u201D.\nThe field\
            \ field is present if message type is Credit/debit Notification (camt.054)"
        creditorAccountId:
          allOf:
          - $ref: '#/components/schemas/Account'
          description: 'Account credited.

            The field field is present if message type is Credit/debit Notification
            (camt.054) or or Payment Status Query response (camt.006)'
        creditorBic:
          allOf:
          - $ref: '#/components/schemas/Bic11'
          description: 'RT1 BIC whose position will be updated, can be a LP or one
            of his LSPs.

            The field field is present if message type is Credit/debit Notification
            (camt.054) or Payment Status Query response (camt.006)'
        currBalance:
          allOf:
          - $ref: '#/components/schemas/Amount'
          description: 'Current balance of the account.

            The field field is present if message type is Return Account (camt.004)'
        debAccoOwnBic:
          allOf:
          - $ref: '#/components/schemas/Bic11Only'
          description: 'BIC of Financial Institution owning the account to be debited

            The field field is present if message type is LTO (camt.050)'
        debtorAccountId:
          allOf:
          - $ref: '#/components/schemas/Account'
          description: 'Account debited.

            The field field is present if message type is Credit/debit Notification
            (camt.054)'
        debtorBic:
          allOf:
          - $ref: '#/components/schemas/Bic11'
          description: 'The Debtor BIC of the Liquidity transfer order

            The field field is present if message type is Credit/debit Notification
            (camt.054)'
        endToEndId:
          allOf:
          - $ref: '#/components/schemas/EndToEndId'
          description: 'End To End Indentifier.

            The field field is present if message type is LTO (camt.050) ,Credit/Debit
            Notification (camt.054)'
        errStatusTransDtTm:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          description: 'Date and Time indicating when RT1 received the NACK signal
            from TIPS/Participant.

            Only available in case the original camt.050 or camt.003 was transmitted
            via message interface.'
        fnalPayStatusCode:
          allOf:
          - $ref: '#/components/schemas/FnalPayStatusCode'
          description: "The final status code of the original transaction.\nPossible\
            \ values:\n\u2022 \u201CSTLD\u201D for Settled;\n\u2022 \u201CCAND\u201D\
            \ for Cancelled;\n\u2022 \u201CFNLD\u201D for Expired.\n\u2022 \u201C\
            FAIL\u201D for Failed.\n\u2022 \u201CPSTL\u201D for Reserved\nThis field\
            \ is present if the message type is Payment Status Query Response (camt.006)"
        fnalPayStatusTimestamp:
          allOf:
          - $ref: '#/components/schemas/Time'
          description: 'Timestamp related to the final status code.

            The time at which the Instant Payment Transaction or the Positive Response
            for a Recall was settled.

            This field is present if the message type is Payment Status Query Response
            (camt.006)'
        forwardingTimestamp:
          allOf:
          - $ref: '#/components/schemas/Time'
          description: "The Forwarding to the Beneficiary Timestamp.\nPresent in case\
            \ the Payment Status Code in the response includes \u201CBFWD\u201D.\n\
            This field is present if the message type is Payment Status Query Response\
            \ (camt.006)"
        instructionIdentifcation:
          allOf:
          - $ref: '#/components/schemas/InstructionIdentification'
          description: 'Original Liquidity Transfer reference

            The field field is present if message type is Credit/debit Notification
            (camt.054)'
        liquiTransfId:
          allOf:
          - $ref: '#/components/schemas/LiquiTransfId'
          description: 'Liquidity Transfer Identifier.

            The field field is present if message type is LTO (camt.050)'
        ltoTipsStatus:
          allOf:
          - $ref: '#/components/schemas/LtoTipsStatus1'
          description: 'Select the message status of the outbound liquidity transfer
            order as processed by TIPS.

            The field field is present if message type is Receipt (camt.025)'
        messageId:
          allOf:
          - $ref: '#/components/schemas/MessageId'
          description: Identification of the message
        messageStatus:
          allOf:
          - $ref: '#/components/schemas/Status2'
          description: Message status code
        messageType:
          allOf:
          - $ref: '#/components/schemas/MessageType1'
          description: "Identification of the message sent by Participant\nPossible\
            \ values are:\n\u2022 Outbound LTO (camt.050)\n\u2022 Funding/Defunding\
            \ LTO (camt.050)\n\u2022 Receipt (camt.025)\n\u2022 Get Account (camt.003)\n\
            \u2022 Return Account (camt.004)\n\u2022 Payment Status Query (camt.005)\n\
            \u2022 Payment Status Query Response (camt.006)"
        notStatusTransDtTm:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          description: Indicates the date and time when the ACK signal has been received
            from the network/Participant. Only available in case the original camt.050
            or camt.003 was transmitted via message interface.
        notificationAmount:
          allOf:
          - $ref: '#/components/schemas/Amount'
          description: 'Amount that has been transferred to the Account.

            The field field is present if message type is Credit/debit Notification
            (camt.054)'
        notificationId:
          allOf:
          - $ref: '#/components/schemas/NotificationId'
          description: 'Notification Identifier.

            The field field is present if message type is Credit/debit Notification
            (camt.054)'
        operationalError:
          allOf:
          - $ref: '#/components/schemas/OperationalError'
          description: 'Specifies the error occurred when processing the originating
            query message,

            This field is present if the message type is Payment Status Query Response
            (camt.006)'
        origInstructingAg:
          allOf:
          - $ref: '#/components/schemas/OrigInstructingAg'
          description: The instructing Agent of the original message (Pacs.008 or
            Pacs.004)
        origMessId:
          allOf:
          - $ref: '#/components/schemas/MessageId'
          description: 'Identification of the original message

            The field field is present if message type are Receipt (camt.025) ,Return
            Account (camt.004) or Payment Status Query Response (camt.006)'
        origTransAmount:
          allOf:
          - $ref: '#/components/schemas/Amount'
          description: Amount of the original transaction
        origTransId:
          allOf:
          - $ref: '#/components/schemas/OrigTransId'
          description: 'Identification of the Instant Payment Transaction.

            It corresponds to original pacs.008 Transaction Identification or pacs.004
            Return Identification.

            This field is present if the message type is Payment Status Query (camt.005)
            or Payment Status Query Response (camt.006)'
        origTransType:
          allOf:
          - $ref: '#/components/schemas/OrigTransType'
          description: "Type of the reported payment.\nIt corresponds to three chars\
            \ in position 27-29 of the message ID.\nPossible values:\n\u2022 008 for\
            \ pacs.008\n\u2022 004 for pacs.004"
        participantBic:
          allOf:
          - $ref: '#/components/schemas/Bic11'
          description: 'Participant or AP BIC

            It is the Debtor BIC if the transaction is a pacs.008; Original Creditor
            BIC if the transaction is a pacs.004

            This field is present if the message type is Payment Status Query (camt.005)'
        processDataTime:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          description: 'RT1 receiving DateTime.

            The field field is not present if message type is Payment Status Query
            (camt.005)'
        processingType:
          allOf:
          - $ref: '#/components/schemas/ProcessingType'
          description: 'Specifies the processing type for the restriction type applied
            to the account.

            The field field is present if message type is Return Account (camt.004)'
        reason:
          allOf:
          - $ref: '#/components/schemas/Reason'
          description: 'Reason of the unsettled status.

            Not present in case the Transaction status is settled.

            This field is present if the message type is Payment Status Query Response
            (camt.006)'
        receiverBic:
          allOf:
          - $ref: '#/components/schemas/Bic11'
          description: 'Receiver BIC of the message.

            This field is present if message type is Receipt (camt.025) or Return
            Account (camt.004)'
        receptionTimestamp:
          allOf:
          - $ref: '#/components/schemas/Time'
          description: "The Reception from the Originator Timestamp.\nPresent in case\
            \ the Payment Status Code in the response includes \u201CORCV\u201D.\n\
            This field is present if the message type is Payment Status Query Response\
            \ (camt.006)"
        rejStatusTransDtTm:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          description: Date and Time indicating when the LTO has been rejected by
            RT1 or by TIPS and Date and Time indicating when RT1 CS negatively processes
            the Receipt, Credit/Debit Notification, Return Account, Payment Status
            Query or Payment Status Query Response.
        requestedThrough:
          allOf:
          - $ref: '#/components/schemas/RequestedThrough1'
          description: "The interface through which the message has been requested\
            \ or sent.\nAvailable values:\n\u2022 GUI-API interface(U2A)\n\u2022 Message\
            \ interface(A2A)"
        restrictionTypeId:
          allOf:
          - $ref: '#/components/schemas/RestrictionTypeId'
          description: 'Restriction Type identifier applied to the account.

            The field field is present if message type is Return Account (camt.004)'
        returnAcctTp:
          allOf:
          - $ref: '#/components/schemas/ReturnAcctTp'
          description: The field field is present if message type is Return Account
            (camt.004)
        senderBic:
          allOf:
          - $ref: '#/components/schemas/Bic8'
          description: 'Sender BIC of the message.

            The field field is present if message type is LTO (camt.050) ,Credit/Debit
            Notification (camt.054) ,Get Account message( camt.003), Payment Status
            Query (camt.005) or Payment Status Query Response (camt.006)'
        settlDate:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: 'Settlement Date of the credit transfer.

            The field field is present if message type is LTO (camt.050)'
        tipsAccoId:
          allOf:
          - $ref: '#/components/schemas/Account'
          description: 'Account identifier retrieved from reference data repository.

            The field field is present if message type is Return Account (camt.004)'
        tipsCmbIdentifier:
          allOf:
          - $ref: '#/components/schemas/TipsCmbIdentifier'
          description: 'Identification of the CMB,

            The field field is present if message type is Return Account (camt.004)'
        tipsPartBic:
          allOf:
          - $ref: '#/components/schemas/Bic11Only'
          description: 'BIC code of the account owner.

            The field is present if message type is Return Account (camt.004)'
        tipsTimestamp:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          description: 'Timestamp when the request has been processed.

            The field field is present if message type are Receipt (camt.025) and
            Return Account (camt.004)'
        transmStatusTransDtTm:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          description: Date and Time indicating when the LTO, Receipt,Credit/Debit
            Notiification, Get Qccount Message, Return Account, Payment Status Query
            and Payment Status Query Response has been transmitted/received to/from
            Participant or TIPS. Only available in case the original camt.050 or camt.003
            was transmitted via message interface.
      required:
      - messageType
      - transmStatusTransDtTm
      - errStatusTransDtTm
      - notStatusTransDtTm
      - rejStatusTransDtTm
      - messageId
      - processDataTime
      - messageStatus
      type: object
    MessageId:
