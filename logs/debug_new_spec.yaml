            \ Insert\n- \u201CRNL\u201D R-only\n- \"MOD\" Amend\n- \"REV\" Revoke\n\
            - \u201CACP\u201D APSP Change P."
        referenceId:
          allOf:
          - $ref: '#/components/schemas/ReferenceId'
          description: Unique reference ID of the operation
        requestor:
          allOf:
          - $ref: '#/components/schemas/Requestor'
          description: The user who submitted the operation
        status:
          allOf:
          - $ref: '#/components/schemas/Status7'
          description: "The current status of the operation. Values are \u201CTO BE\
            \ AUTHORIZED\u201D, \u201CAUTHORIZED\u201D, \u201CSUBMITTED\u201D, \u201C\
            EXECUTED\u201D, \u201CREJECTED\u201D and \u201CREJECTED BY SYSTEM\u201D\
            ."
      required:
