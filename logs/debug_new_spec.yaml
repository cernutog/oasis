    PaymentDetails:
      properties:
        acceptanceReceptionDate:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: "Date to be used for both acceptance and reception search criteria.\n\
            \n **Validation Rule(s)** It must not be greater than the current date\
            \ (ErrorCode DT01)\n\nIf isReceptionDate is 1:  the\nacceptanceReceptionDate\
            \  + timeFrom + timeTo  must be used to search the transactions by reception\
            \ date criterion.\n\nIf isReceptionDate is 0: the\nacceptanceReceptionDate\
            \  + timeFrom + timeTo must be used to search the transactions by the\
            \ oldest AcceptanceDateTime ( AT-T056 ) of the IPs that will be returned\
            \ in the API Response"
        amountRange:
          $ref: '#/components/schemas/AmountRange'
        creditorBic:
          allOf:
          - $ref: '#/components/schemas/Bic11'
          description: RT1 BIC whose position will be updated, can be a LP or one
            of his LSPs.
        csm:
          allOf:
          - $ref: '#/components/schemas/Csm1'
          description: "The Clearing and Settlement Mechanism by which transactions\
            \ were processed.\n\n **Validation Rule(s)** It must be one of the configured\
            \ vaue:\nRT1: Transaction Settled in RT1;\nRT1-TIPS: Transaction settled\
            \ in TIPS though RT1 Techenical Account;\nTIPS: Transaction settlend in\
            \ TIPS on DCA account\n(ErrorCode XA03)"
        debtorBic:
          allOf:
          - $ref: '#/components/schemas/Bic11'
          description: The Debtor Agent of the transaction
        endToEndID:
          allOf:
          - $ref: '#/components/schemas/EndToEndID'
          description: "The End to End Id.\n\n **Validation Rule(s)** It must correspond\
            \ to an End to End Id present in the Database (error XA03 \u2013 unknown\
            \ value in the system)"
        instructedBic:
          allOf:
          - $ref: '#/components/schemas/Bic8'
          description: "The Instructed Agent of the transaction\n\n **Validation Rule(s)**\
            \ Either the InstructingBic or the InstructedBic must be equal to the\
            \ SenderBic (ErrorCode XA07). If the InstructedBic is the SenderBic only\
            \ the IPs sent from the system to the SenderBic are returned."
        instructingBic:
          allOf:
          - $ref: '#/components/schemas/Bic8'
          description: "The Instructing Agent of the transaction\n\n **Validation\
            \ Rule(s)** Either the InstructingBic or the InstructedBic must be equal\
            \ to the SenderBic (ErrorCode XA07). If the InstructingBic is the SenderBic\
            \ only the IPs sent from the SenderBIC to the system are returned."
        ipStatus:
          allOf:
          - $ref: '#/components/schemas/IpStatus'
          description: "The status of the IP\n\n **Validation Rule(s)** It can assume\
            \ only one of the configured values on the system. The possible values\
            \ are:\n\u201CPBB\u201D Processed by the Beneficiary Bank\n\u201CRBB\u201D\
            \ Rejected by the Beneficiary Bank\n\u201CRBE\u201D Rejected by EBA\n\u201C\
            PBE\u201D Processed by EBA\n\u201CRBC\u201D Rejected by SCT Inst\n\u201C\
            PEN\u201D Pending\n\"WTG\" Waiting (only retrieve in-flight non-time critical\
            \ transactions)\n (ErrorCode XA03)"
        isReceptionDate:
          allOf:
          - $ref: '#/components/schemas/IsReceptionDate'
          description: "Defines the search date criterion between:\n- 0: acceptance\
            \ date\n- 1: reception date.\n\n **Validation Rule(s)** Must be 0,1. (ErrorCode\
            \ XA13)"
        lac:
          allOf:
          - $ref: '#/components/schemas/LacNumber'
          description: "The LAC of the IP\n\n **Validation Rule(s)** It must be one\
            \ of the configured Checkpoint in the system (ErrorCode XA03)"
        productId:
          allOf:
          - $ref: '#/components/schemas/ProductId'
          description: "Field used to filter transaction for configured defaultProduct\n\
            \n **Validation Rule(s)** Product must be a defaultProduct defined in\
            \ the system (ErrorCode XA03)\nThe SenderBIC must be configured for the\
            \ chosen product.\n(ErrorCode XA13)"
        timeFrom:
          allOf:
          - $ref: '#/components/schemas/Time'
          description: "The oldest timestamp of the sending or receiving of the transactions\
            \ by the system.\nFormat: HH:MM:SS\n\n **Validation Rule(s)** If isReceptionDate\
            \ is 1 the time interval timeFrom \u2013 timeTo must be shorter than one\
            \ hour. (ErrorCode DT01)"
        timeTo:
          allOf:
          - $ref: '#/components/schemas/Time'
          description: "The greatest timestamp of the sending or receiving of the\
            \ transactions by the system.\nFormat: HH:MM:SS\n\n **Validation Rule(s)**\
            \ If isReceptionDate is 1 the time interval timeFrom \u2013 timeTo must\
            \ be shorter than one hour. (ErrorCode DT01)"
        transactionId:
          allOf:
          - $ref: '#/components/schemas/TransactionId'
          description: The identification of the transaction
