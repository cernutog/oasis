  /currentNetPosition/{senderBic}:
    post:
      description: "The Current Position request allows the Participant to inquire\
        \ about its real time liquidity position in the SCT Inst.\nUpon receiving\
        \ this Request, the SCT Inst will inquire the real time Position of the inquiring\
        \ Participant and returns the value of the timestamp of the reading.\nThe\
        \ result of the inquiry done for a Participant that is not part of a Liquidity\
        \ Branch Funds Balance will always be a positive value. If the Participant\
        \ belongs to a Liquidity Branch Funds Balance, it is possible that the Current\
        \ Position is a negative value.\nThe SCT Inst will always verify if the Participant\
        \ is part of a Liquidity Branch Funds Balance, if this the case the Response\
        \ will contain the Position of both the Participant and the Position of all\
        \ Liquidity Branch Funds Balances the Participant is a member of.\nThe response\
        \ contains the current Position of the Participant.\nIf the Participant is\
        \ an LP, the system will return the current Position of each LSP for whose\
        \ liquidity management it is responsible for.\nIn the case that the Participant\
        \ is a member of one or more Liquidity Branch Funds Balances, the \u201CBranchFundsBalanceId\u201D\
        \ and \u201CBranchFundsBalancePosition\u201D elements contain the Branch Funds\
        \ Balance identification and the current position of the Branch Funds Balance\
        \ to which the Participant belongs to. If the Participant is the Owner of\
        \ one or more Liquidity Branch Funds Balances, the section \u201COwnedBranchFundsBalance\u201D\
        \ is repeated for each Liquidity Branch Funds Balance that is owns. The \u201C\
        OwnedMember\u201D for each \u201COwnedBranchFundsBalance\u201D lists the members\
        \ of the Branch Funds Balance and the Position of each member."
      operationId: currentNetPosition
      parameters:
      - description: "The BIC of the Participant sending the API Request\n\n **Validation\
          \ Rule(s)** It must be equal to the BIC identified through its certificate\
          \ (ErrorCode XA02)\nIt must be an enabled, suspended, r-only or inserted\
          \ Participant (ErrorCode PY01)\nIf the BIC is valued but different from\
          \ the SenderBic, the SenderBic must be the Owner of the branchFundsBalanceId\
          \ (ErrorCode XA06)"
        in: path
        name: senderBic
        required: true
        schema:
          $ref: '#/components/schemas/SenderBic'
