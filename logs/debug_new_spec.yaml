  /listPayments/{senderBic}:
    post:
      description: "The Participant has the option to search for the instant payment\
        \ pacs.008 using two date search criteria: (1) Acceptance Date and Time; (2)\
        \ Reception Date and Time.\n(1) To search transactions by Acceptance Date\
        \ and Time, the option \"isReceptionDate\" shall be set to \"0\". The Participant\
        \ may specify the \"acceptanceReceptionDate\" date and the \"timeFrom\" time\
        \ as the starting point of the search, using the same UTC format as the AT\u2011\
        T056 included in the instant payment pacs.008.\n(2) To search transactions\
        \ by Reception Date and Time, the option \"isReceptionDate\" must be set to\
        \ \"1\". The Participant may specify the \"acceptanceReceptionDate\" date\
        \ together with the \"timeFrom\" \u2013 \"timeTo\" interval, ensuring that\
        \ the selected timeframe does not exceed one hour.\nIn both cases, the Participant\
        \ may provide time values down to the millisecond to refine the search time\
        \ interval."
