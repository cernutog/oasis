  /defunding/{senderBic}:
    put:
      description: "The ReleaseLiquidity request allows the Participant to defund\
        \ the desired amount from its Position in the SCT Inst to its DCA account\
        \ in TIPS; the system shall check that the amount to be defunded is less than\
        \ or equal to the available position of the Participant in the system and,\
        \ if not, the request shall be rejected.\nThe Participant is allowed to ask\
        \ for the defunding of the entire amount corresponding to its position.\n\
        If the Participant belongs to a Branch Funds Balance and the Liquidity Position\
        \ of the Branch Funds Balance is lesser than the amount to be defunded, the\
        \ request shall be rejected.\nIf the Participant is an LSP whose liquidity\
        \ management is delegated, the request is rejected with ErrorCode XA14.\n\
        If the Participant is an LP, it is allowed to send the ReleaseLiquidity Request\
        \ on behalf of the LSPs whose liquidity management is responsible for.\nIf\
        \ the Participant is the Owner of a Branch Funds Balance, it is allowed to\
        \ use this request to defund the liquidity of another not-suspended BIC that\
        \ is a Member of the Branch Funds Balance, from the Position of the MemberBic\
        \ in the system to the DCA account of the MemberBic in TIPS.\nThe response\
        \ contains the confirmation or rejection of the request.\nIf the Participant\
        \ is in Technical Isolation, the request is rejected with ErrorCode XA23\n\
        \nPlease, note that the request can be sent to SCT Inst only if the \u201C\
        FREEZE TIPS Exchange Liquidity\u201D command has not been issued, otherwise\
        \ the request will be rejected with ErrorCode XA09."
      operationId: releaseLiquidiy
      parameters:
      - description: "The BIC of the Participant sending the API Request\n\n **Validation\
          \ Rule(s)** It must be equal to the BIC identified through its certificate\
          \ (ErrorCode XA02)\nIt must be an enabled, r-only or inserted Participant\
          \ (ErrorCode PY01)\nIf the MemberBIC is valued and different from the SenderBic,\
          \ the SenderBIC must be the Owner of the branchFundsBalanceId (ErrorCode\
          \ XA06)\nThe SenderBic liquidity must be managed by the SenderBic itself\
          \ (ErrorCode XA14)\nThe SenderBic must not be isolated (\u201CTechnical\
          \ Isolation\u201D flag equal to \u201CNo\u201D) (ErrorCode XA23)"
        in: path
        name: senderBic
        required: true
        schema:
          $ref: '#/components/schemas/SenderBic'
