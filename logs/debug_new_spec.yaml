  /inquiryUnavailability/{senderBic}:
    post:
      description: "The Inquiry Unavailability request allows the RT1 user to inquire\
        \ about the unavailability of:\n\u2022    RT1 Participants, based on what\
        \ has been communicated through the Communication of Unavailability function.\n\
        \u2022    A TIPS Participants, based on the messages sent by TIPS to RT1.\n\
        The two search options are mutually exclusive, as follows:\n\u2022    When\
        \ \u201CfromTIPS\u201D is set to \u201C1\u201D, the search result includes\
        \ all CS admi.004 messages received from TIPS. If present, the element \u201C\
        unavailableBic\u201D is not taken into account.\n\u2022    When \u201CfromTIPS\u201D\
        \ is set to \u201C0\u201D or is not present, the search result includes any\
        \ admi.004 message, both CS admi.004 (triggered by an admi.004 received from\
        \ TIPS) and admi.004 received from RT1 Participants. If \u201CunavailableBic\u201D\
        \ is present and set to a specific BIC code, it is used as a filter.\n\u2022\
        \    When the request is sent without the elements \u201CunavailableBic\u201D\
        \ and \u201CfromTIPS\u201D, the search result includes all current or future\
        \ unavailability periods generated by any RT1 Participant, as well as all\
        \ current or future unavailability periods generated by CS with the TIPS BIC\
        \ as sender BIC.\n\nIf the unavailability has been communicated for a specific\
        \ RT1 Participant and for all its APSPs (\u201CBIC Code\u201D = BIC8 and \u201C\
        APSPs Unavailability\u201D checked), the APSP BICs unavailability information\
        \ shall be available in the \u201CInquiry Unavailability\u201D functionality\
        \ even if the unavailability information has been required for a Participant\
        \ BIC8 in \u201CBIC Code\u201D searching criteria field."
      operationId: inquiryUnavailability
      parameters:
      - description: "The BIC of the Participant sending the API Request\n\n **Validation\
          \ Rule(s)** It must be equal to the BIC identified through its certificate\
          \ (ErrorCode XA02)\nIt must be an enabled, r-only or suspended Participant\
          \ (ErrorCode PY01)"
        in: path
        name: senderBic
        required: true
        schema:
          $ref: '#/components/schemas/SenderBic'
      requestBody:
        content:
          application/json:
            examples:
              Bad Request:
                value:
                  criteria:
                    fromTIPS: '0'
                    unavailableBic: IPSDPF21XXX
              OK:
                value:
                  criteria:
                    fromTIPS: '0'
                    unavailableBic: IPSDPF21XXX
                  dateTime: '2019-06-21T23:20:50.000001'
            schema:
