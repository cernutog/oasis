  /listTransactions/{senderBic}:
    post:
      description: "The ListTransactions request allows the Participant to retrieve\
        \ a list of R-messages (pacs.004, pacs.002, pacs.028, camt.056, camt.027 and\
        \ camt.029) send to or received from the SCT Inst. The Participant has the\
        \ option to use filtering criteria to reduce the number of transactions in\
        \ the response.\nThe Participant has the option to search for the R-messages\
        \ using two date search criterion: (1) Settlement Date and Time; (2) Reception\
        \ Date and Time.\n(1) To search for R-messages by Settlement Date and Time\
        \ criteria, the option \"isReceptionDate\" shall be set to \"0\". The Participant\
        \ must specify the \"settlementReceptionDate\" date and the \"timeFrom\" time\
        \ as the start point of the search.\n(2) To search for R-messages by Reception\
        \ Date and Time criteria, the option \"isReceptionDate\" shall be set to \"\
        1\". The Participant must specify the \" settlementReceptionDate\" date and\
        \ the time interval \"timeFrom\" \u2013 \"timeTo\", ensuring that the timeframe\
        \ does not exceed one hour.\nIn both cases, the Participant has the option\
        \ to specify the time down to the millisecond level to fine\u2011tune the\
        \ timeframe of the search.\nIn the case that the result has more than 1000\
        \ matching transactions, the response will contain an offset. By resubmitting\
        \ the same request with a different offset value the Participant can retrieve\
        \ all matching transactions.\nThe response will return a list of all R-messages,\
        \ matching the criteria of the request that is sorted by TransactionId, ProcessingDate,\
        \ ReceptionTime, InstructingBic, InstructedBic and TransactionStatus. The\
        \ resulting list shall contain a maximum of 1000 R-messages.\nThe transactions\
        \ rejected due to acceptance-date-time (AT-T056) already expired when received\
        \ by RT1 System are not displayed (In case the pacs.008 cannot be delivered\
        \ to the BB, because it is not reacheable (AB07) or when the pacs.008 arrive\
        \ in the CS already overdue (and it is consequently not delivered to the BB\
        \ and rejected to the OB for timeout - AB06), the transaction will not be\
        \ visible in the PWS and API by the Beneficiary Bank but will be notified\
        \ in the RSF file. In case the transaction is delivered to the BB and then\
        \ goes in timeout (TM01 for BB and AB06 for OB), it is then visible via PWS\
        \ and API to both OB and BB.)\n"
      operationId: listTransactions
      parameters:
      - description: "The BIC of the Participant sending the API Request\n\n **Validation\
          \ Rule(s)** It must be equal to the BIC identified through its certificate\
          \ (ErrorCode XA02)\nIt must be an enabled, suspended or R-only Participant\
          \ (ErrorCode PY01)"
        in: path
        name: senderBic
        required: true
        schema:
          $ref: '#/components/schemas/SenderBic'
      requestBody:
        content:
          application/json:
            examples:
              Bad Request:
                value:
                  criteria:
                    amountRange:
                      amountRangeFrom: 9.99
                      amountRangeTo: 2000.11
