info:
  description: PWS RESTful API for interacting with RT1 services
  title: EBACL RT1 REST API - PWS
  version: '5.0'
  x-info-creation-date: '2026-04-02'
  x-info-customization: SWIFT
  x-info-release: v20261115
openapi: 3.0.0
paths:
  /apDetails/{senderBic}/{bicAp}:
    post:
      description: 'The APDetails request allows the Participant to retrieve the details
        of an AP.

        The response contains the details of the specified AP.

        A request addressed to an AP belonging to the sending participant will be
        responded with the full set of information available.

        '
      operationId: APDetails
      parameters:
      - description: "The BIC of the Participant sending the API Request\n\n **Validation\
          \ Rule(s)** It must be equal to the BIC identified through its certificate\
          \ (ErrorCode XA02)\nIt must be an enabled, suspended, inserted or R-only\
