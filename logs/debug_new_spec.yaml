                      startDateTime: '2024-11-08T14:29:00.012345'
                      status: '0'
                      unavailableBic: CIPBITMMXXX
                    - apspsUnavailability: '0'
                      durationOfUnavailability: 01d 11h 21m 05s
                      endDateTime: '2019-06-21T23:20:50.000001'
                      eventDescription: Free text to describe the event that causes
