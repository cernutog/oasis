  /exceptionPositionCalendar/{senderBic}:
    put:
      description: "The Set Exception Position Calendar request allows the Participant\
        \ to set the desired position in the SCT Inst for LACs later than the current\
        \ LAC of the current Business Date, or for LACs of a Business Date in the\
        \ future, that is no further than one year from the current date.\nIf the\
        \ Participant is an LSP whose liquidity management is delegated, the request\
        \ is rejected with ErrorCode XA14.\nIf the Participant is an LP, it is allowed\
        \ to send the SetExceptionPositionCalendar Request on behalf of those LSPs\
        \ whose liquidity management is responsible for.\n\nFor a LAC of the selected\
        \ Business Date, the Participant can specify its (or those of the specified\
        \ LSPBic) lower, base and upper values: they will be exceptionally applied\
        \ at the occurrence of the BusinessDate and LAC as an exception to the default\
        \ values of the day of the week associated to the BusinessDate.\nIf the pair\
        \ BusinessDate \u2013 LAC in the request is the next one with respect to the\
        \ current Business Date-LAC of the system, the new values are applied only\
        \ if the API Request is received within the \u201CLiquidity Agenda Grace Time\u201D\
        \ system parameter, that represents the minimum time interval remaining to\
        \ the end of the current LAC, otherwise the request is rejected.\nThe request\
        \ must anyway be submitted within the \u201CRouting Grace Time\u201D, the\
        \ system parameter that represents the time limit before midnight for the\
        \ Participants to submit requests for updates, otherwise it is rejected with\
