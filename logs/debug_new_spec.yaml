            \ for September;\n- \u201C10\u201D for October;\n- \u201C11\u201D for\
            \ November;\n- \u201C12\u201D for December.\n(ErrorCode XA03).\nFor the\
            \ selected month the \u201CInterest Calculation\u201D must have run. The\
            \ \u201CInterest Calculation\u201D status shall be equal to \u201Ccalculated\u201D\
            \ or \u201Ccompleted\u201D (Error Code XA19)"
        year:
          allOf:
          - $ref: '#/components/schemas/Year'
          description: "The year for which the User requires Interest\u2019s details\n\
            \n **Validation Rule(s)** It shall correspond to a year between the current\
            \ and the last year (Error Code DT01)"
      required:
      - bic
      - month
      - year
      type: object
    Criteria3:
      properties:
        accOrCmbId:
          allOf:
          - $ref: '#/components/schemas/Account'
          description: "Field where to enter the identification of the account or\
            \ CMB\n\n **Validation Rule(s)** This field is allowed if message type\
            \ is Get Account (camt.003)\n(errorCode: XA13)"
        accUser:
          allOf:
          - $ref: '#/components/schemas/Account'
          description: "Field where to enter the BIC of the user of the Account or\
            \ CMB\n\n **Validation Rule(s)** This field is allowed if message type\
            \ is Get Account (camt.003)\n(errorCode: XA13)"
        businessError:
          allOf:
          - $ref: '#/components/schemas/ErrorCode'
          description: "Error raised\n\n **Validation Rule(s)** This field is allowed\
            \ if message type is Return Account (camt.004)\n(errorCode: XA13)"
        creAccOwnBic:
          allOf:
          - $ref: '#/components/schemas/Bic11Only'
          description: "The BIC11 of the owner of the debit-ed TIPS Account\n\n **Validation\
            \ Rule(s)** This field is allowed if message type is Outbound LTO (camt.050),\
            \ Funding/Defunding LTO (camt.050) or Credit/Debit Notification (camt.054).\n\
            (errorCode: XA13)"
        debAccOwnBic:
          allOf:
          - $ref: '#/components/schemas/Bic11Only'
          description: "The BIC11 of the owner of the debited TIPS Account\n\n **Validation\
            \ Rule(s)** This field is allowed if message type is Outbound LTO (camt.050),\
            \ Funding/Defunding LTO (camt.050) or Credit/Debit Notification (camt.054)\n\
            (errorCode: XA13)"
        intraserviceLtoType:
          allOf:
          - $ref: '#/components/schemas/IntraserviceLtoType'
          description: "This criteria is available only in case Message Type has been\
            \ set equal to \u201CFunding /Defunding LTO\u201D.\n\n **Validation Rule(s)**\
            \ Allowed values:\n\u2022 FUN: Funding\n\u2022 DEF: Defunding\n(schema\
            \ error)."
        ltoTipsStatus:
          allOf:
          - $ref: '#/components/schemas/LtoTipsStatus'
          description: "Select the message status of the outbound liquidity transfer\
            \ order as processed by TIPS:\n\u2022 RREJ (rejected by T2)\n\u2022 RCON\
            \ (confirmed by T2)\n\u2022 RJCS (any other value)\n\n **Validation Rule(s)**\
            \ The field field is allowed if message type is Receipt (camt.025)\n(errorCode:\
            \ XA13)"
        messageId:
          allOf:
          - $ref: '#/components/schemas/MessageId'
          description: Identification of the message sent by Participant
        messageStatus:
          allOf:
          - $ref: '#/components/schemas/Status1'
          description: "The message status.\n\n **Validation Rule(s)** new validation\
            \ rule for field messageStatus has to be:\nAllowed values:\n\u2022 TSD:\
            \ Transmitted (all messages)\n\u2022 NTF: Notified (all messages)\n\u2022\
            \ STD: Settled (camt.050)\n\u2022 RJS: Rejected (camt.050 \u2013 camt.003\
            \ \u2013 camt.004 \u2013 camt.005 \u2013 camt.006 - camt.025 - camt.054)\n\
            \u2022 ERR: Error (camt.025 \u2013 camt.054).\n(schema validation)"
        messageType:
          allOf:
          - $ref: '#/components/schemas/MessageType'
          description: "Identification of the message sent by Participant\n\n **Validation\
            \ Rule(s)** Possible values are:\n\u2022 Outbound LTO (camt.050)\n\u2022\
            \ Funding/Defunding LTO (camt.050)\n\u2022 Credit/Debit Notification (camt.054)\n\
            \u2022 Receipt (camt.025)\n\u2022 Get Account (camt.003)\n\u2022 Return\
            \ Account (camt.004)\n\u2022 Payment Status Query (camt.005)\n\u2022 Payment\
            \ Status Query Response (camt.006)\n(schema error)\n\nFor camt.003/004\
            \ shall be excluded all the  RT1-destined messages:\n\u2022 excluded camt.003\
            \ where AcctQryDef > AcctCrit > NewCrit > SchCrit > AcctId/EQ/Othr/Id\
            \ is equal to \"RT1-FUNDBALANCE\"\n\u2022 excluded camt.004 where RptOrErr\
            \ > AcctRpt > AcctId > Othr > Id is equal to \"RT1-FUNDBALANCE\""
        messageTypeCamt005:
          allOf:
          - $ref: '#/components/schemas/MessageTypeCamt005'
          description: "Indicates the type of the original message\n\n **Validation\
            \ Rule(s)** This field is allowed if message type is Payment Status Query\
            \ Response (camt.005) (errorCode: XA13)\nIndicates the type of the original\
            \ message.\nAvailable only for messages generated by RT1 CS in the Message\
            \ ID field.\nAllowed values:\n\u2022 Pacs.008;\n\u2022 Pacs.004.\n(schema\
            \ error)"
        origMessId:
          allOf:
          - $ref: '#/components/schemas/MessageId'
          description: "The Identifiier of the original message\n\n **Validation Rule(s)**\
            \ The field field is allowed if message type is Receipt (camt.025) , Return\
            \ Account (camt.004)\n(errorCode: XA13)"
        origTransactionId:
          allOf:
          - $ref: '#/components/schemas/OriginalTransactionId'
          description: "Field where to enter the identification of the originating\
            \ payment message\n\n **Validation Rule(s)** This field is allowed if\
            \ message type is Payment Status Query (camt.005) or Payment Status Query\
            \ Response (camt.006)\n(errorCode: XA13)"
        paymentStatus:
          allOf:
          - $ref: '#/components/schemas/PaymentStatus'
          description: "Select the status of the payments inquired.\n\n **Validation\
            \ Rule(s)** This field is allowed if message type is Payment Status Query\
            \ Response (camt.006) (errorCode: XA13)\nSelect the status of the payments\
            \ inquired.\nAllowed values:\n\u2022 Pending (PSTL)\n\u2022 Settled (STLD)\n\
            \u2022 Cancelled (CAND)\n\u2022 Expired (FNLD)\n\u2022 Rejected (RJTD)\n\
            \u2022 Failed (FAIL)\n(schema error)"
        processingDtFrom:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: Field where to enter the lower bound of the processing date
        processingDtTo:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: "Field where to enter the upper bound of the processing date\n\
            \n **Validation Rule(s)** Allowed range up to 7 days from \u201CprocessingDtFrom\u201D\
            \ (errorCode DT01)"
        processingTmFrom:
          allOf:
          - $ref: '#/components/schemas/Time'
          description: Field where to enter the lower bound of the time
        processingTmTo:
          allOf:
          - $ref: '#/components/schemas/Time'
          description: Field where to enter the upper bound of the time
        requestedThrough:
          allOf:
          - $ref: '#/components/schemas/RequestedThrough'
          description: "Indicates the interface through which the message (or the\
            \ original message, in case of camt.025, camt.004 or camt.006) has been\
            \ requested or sent.\n\n **Validation Rule(s)** Not required if message\
            \ type is equal to camt.054, ErrorCode XA07 is returned.\nAllowed values:\n\
            \u2022 U2A: GUI-API interface;\n\u2022 A2A: Message interface;\n(schema\
            \ validation)\n\n\"Resend Receipt\" and \"Resend Notification\" are allowed\
            \ only when the messages was previously trasmitted to the Participant\
            \ via interface Message Interface"
        senderReceiverBic:
          allOf:
          - $ref: '#/components/schemas/Bic8'
          description: "Sender BIC of the message\n\n **Validation Rule(s)** One of\
            \ the following must be true:\n- The BIC is an LSP of the SenderBic and\
            \ the SenderBic manages the liquidity of the BIC\n- The BIC must belong\
            \ to a Branch Funds Balance and the SenderBic is the Owner of that Branch\
            \ Funds Balance\n\nIf none of the above conditions applies, the ErrorCode\
            \ XA07 is returned."
        settlDate:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: "The settlement Date of the credit transfer or the booking\
            \ date of the Debit/Credit notification.\n\n **Validation Rule(s)** This\
            \ field is allowed if message type is Outbound LTO (camt.050), Funding/Defunding\
            \ LTO (camt.050) or Credit/Debit Notification (camt.054)\n(errorCode:\
            \ XA13)"
        tipsTimestampDtFrom:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: "Field where to enter the lower bound of the timestamp assigned\
            \ by TIPS when retrieval of records has been performed\n\n **Validation\
            \ Rule(s)** This field is allowed if message type is Return Account (camt.004)\n\
            (errorCode: XA13)"
        tipsTimestampDtTo:
          allOf:
          - $ref: '#/components/schemas/Date'
          description: "Field where to enter the upper bound of the date assigned\
            \ by TIPS when retrieval of records has been performed\n\n **Validation\
            \ Rule(s)** This field is allowed if message type is Return Account (camt.004)\n\
            (errorCode: XA13)"
        tipsTimestampTmFrom:
          allOf:
          - $ref: '#/components/schemas/Time'
          description: "Field where to enter the upper bound of the date assigned\
            \ by TIPS when retrieval of records has been performed\n\n **Validation\
            \ Rule(s)** This field is allowed if message type is Return Account (camt.004)\n\
            (errorCode: XA13)"
        tipsTimestampTmTo:
          allOf:
          - $ref: '#/components/schemas/Time'
          description: "Field where to enter the upper bound of the time assigned\
            \ by TIPS when retrieval of records has been performed\n\n **Validation\
            \ Rule(s)** This field is allowed if message type is Return Account (camt.004)\n\
            (errorCode: XA13)"
      required:
      - messageType
      - processingDtFrom
      type: object
    Criteria4:
      properties:
        messageId:
          allOf:
          - $ref: '#/components/schemas/MessageId'
          description: Identification of the message sent by Participant
        messageType:
          allOf:
          - $ref: '#/components/schemas/MessageType1'
          description: "Identification of the message sent by Participant\n\n **Validation\
            \ Rule(s)** Possible values are:\n\u2022 Outbound LTO (camt.050)\n\u2022\
            \ Funding/Defunding LTO (camt.050)\n\u2022 Receipt (camt.025)\n\u2022\
            \ Get Account (camt.003)\n\u2022 Return Account (camt.004)\n\u2022 Payment\
            \ Status Query (camt.005)\n\u2022 Payment Status Query Response (camt.006)\n\
            (schema validation)"
        processingDtTm:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          description: Field where to enter the lower bound of the processing date
        senderReceiverBic:
          allOf:
          - $ref: '#/components/schemas/Bic8'
          description: Sender BIC of the message
      required:
      - messageType
      - messageId
      - senderReceiverBic
      - processingDtTm
      type: object
    Criteria5:
      properties:
        amount:
          allOf:
          - $ref: '#/components/schemas/Amount'
          description: "The amount to be transferred.\n\n **Validation Rule(s)** Only\
            \ decimal notation is allowed (XA05)"
        beneficiaryAcc:
          allOf:
          - $ref: '#/components/schemas/Account'
          description: "The Beneficiary Account\n\n **Validation Rule(s)** The Account\
            \ must be present in Beneficiary repository (ErrorCode XA03)."
        beneficiaryBicCode:
          allOf:
          - $ref: '#/components/schemas/Bic11Only'
          description: "It is the RTGS BIC for defunding to TARGET.\n\n **Validation\
            \ Rule(s)** The BIC must be present in Beneficiary repository (ErrorCode\
            \ PY01)."
        beneficiaryName:
          allOf:
          - $ref: '#/components/schemas/Name'
          description: The Beneficiary Name
        participantBic:
          allOf:
          - $ref: '#/components/schemas/Bic8'
          description: "The Participant Bic\n\n **Validation Rule(s)** Must be equal\
            \ to the BIC of the senderBic (ErrorCodeXA02)"
      required:
      - participantBic
      - beneficiaryBicCode
      - beneficiaryName
      - beneficiaryAcc
      - amount
      type: object
    Criteria6:
      properties:
        csm:
          allOf:
          - $ref: '#/components/schemas/Csm'
          description: "The clearing and settlement mechanism by which transaction\
            \ was processed.\n\n **Validation Rule(s)** Allowed values:\n\uF0A0 RT1-TIPS:\
            \ for hybrid transactions\n\uF0A0 TIIPS: for transactions settled in TIPS.\n\
            (schema validation)"
        date:
          allOf:
          - $ref: '#/components/schemas/ZonedDateTime'
          description: "The AcceptanceDate of the SCT Inst Transaction or the Interbank\
            \ settlement date of the Positive Payment Response\n\n **Validation Rule(s)**\
            \ It must be lesser or equal to the current calendar date and timestamp\
            \ (ErrorCode DT01)"
        participantBic:
          allOf:
          - $ref: '#/components/schemas/Bic11'
          description: "The Participant Bic\n\n **Validation Rule(s)** Must be equal\
            \ to the BIC of the senderBic (ErrorCodeXA02)."
        transactionId:
          allOf:
          - $ref: '#/components/schemas/Transactionid'
          description: The transaction identifier
        transactionType:
          allOf:
          - $ref: '#/components/schemas/TransactionType'
          description: "The type of transaction\n\n **Validation Rule(s)** Allowed\
            \ values:\n\uF0A0 IPT: Instant Payment transaction\n\uF0A0 PPR: Positive\
            \ Payment Response\n(schema validation)"
      required:
      - participantBic
      - date
      - transactionId
      - transactionType
      - csm
      type: object
    Criteria7:
      properties:
        participantBic:
          allOf:
          - $ref: '#/components/schemas/Bic8'
          description: "The Participant Bic\n\n **Validation Rule(s)** Must be equal\
            \ to the BIC of the senderBic (ErrorCodeXA02)"
      required:
      - participantBic
      type: object
    Criteria8:
      properties:
        beneficiaryAcc:
          allOf:
          - $ref: '#/components/schemas/Account'
          description: "The Beneficiary Account\n\n **Validation Rule(s)** Must be\
            \ present if the Operation Type is \"INS\".\n(ErrorCode XA13)"
        beneficiaryBic:
          allOf:
          - $ref: '#/components/schemas/Bic11'
          description: It is the RTGS BIC for defunding to TARGET.
        beneficiaryName:
          allOf:
          - $ref: '#/components/schemas/Name'
          description: "The Beneficiary Name\n\n **Validation Rule(s)** Must be present\
            \ if the Operation Type is \"INS\".\n(ErrorCode XA13)"
        operationType:
          allOf:
          - $ref: '#/components/schemas/OperationType'
          description: "The Operation Type\n\n **Validation Rule(s)** Value allowed:\n\
            \uF0A0 INS: Insert;\n\uF0A0 MOD: modify;\n\uF0A0 REM: remove.\n(schema\
            \ validation)"
        participantBic:
          allOf:
          - $ref: '#/components/schemas/Bic8'
          description: "The Participant Bic\n\n **Validation Rule(s)** Must be equal\
            \ to the BIC of the senderBic (ErrorCodeXA02)"
      required:
      - participantBic
      - beneficiaryBic
      - operationType
      type: object
    Criteria9:
      properties:
        aos:
          allOf:
          - $ref: '#/components/schemas/Aos'
          description: "One of the AOS subscribed by the DP\n\n **Validation Rule(s)**\
            \ AOS must be a string defined in the system (ErrorCode XA03)"
        bic:
          allOf:
          - $ref: '#/components/schemas/Bic8'
          description: The BIC of the searched DP
        lsp:
          allOf:
          - $ref: '#/components/schemas/Lsp'
          description: It indicates if the BIC is served for Liquidity Funding/Defunding
            (value Yes) or not (value No)
        network:
          allOf:
          - $ref: '#/components/schemas/Network'
          description: "Field used to filter Participant for the Network Channel used\n\
            \n **Validation Rule(s)** Allowed values are EAS, EBX, SWI"
        productId:
          allOf:
          - $ref: '#/components/schemas/ProductId'
          description: "Field used to filter Participant for configured product\n\n\
            \ **Validation Rule(s)** Product must be a string defined in the system\
            \ (ErrorCode XA03)\nThe SenderBIC must be configured for the chosen product.\n\
            (ErrorCode XA13)"
        status:
          allOf:
          - $ref: '#/components/schemas/Status3'
          description: "The current status of the DP\n\n **Validation Rule(s)** Allowed\
            \ values:\n\uF0A0 \u201CALL\u201D All statuses\n\uF0A0 \u201CENB\u201D\
            \ Enabled\n\uF0A0 \u201CSUS\u201D Suspended\n\uF0A0 \u201CDIS\u201D Disabled\n\
            \uF0A0 \u201CCNG\u201D Changed\n\uF0A0 \u201CINS\u201D Inserted\n\uF0A0\
            \ \u201CRNL\u201D R-Only\nThe value must be one of the available status\
            \ in the system (ErrorCode XA03)"
        technicalBic:
          allOf:
          - $ref: '#/components/schemas/TechnicalBic'
          description: It indicates if the BIC is a technical one (1) or not (0)
        tipsAccountOwnerBic:
          allOf:
          - $ref: '#/components/schemas/Bic11Only'
          description: TIPS DCA Account Owner for Instra-Service Liquidity Transfer
            (li-quidity funding/defunding)
        tipsAdherence:
          allOf:
          - $ref: '#/components/schemas/TipsAdherence'
          description: "It indicates if the Participant joined to TIPS (1) or not\
            \ (0) (Mandatory if the section is present)\n\n **Validation Rule(s)**\
            \ Allowed values:\n- 0 = Participant not joined to TIPS\n- 1 = Participant\
            \ joined to TIPS"
      type: object
    Critical:
      enum:
      - '0'
      - '1'
      example: '0'
      type: string
    Csm:
      enum:
      - RT1-TIPS
      - TIPS
      example: RT1-TIPS
      type: string
    Csm1:
      enum:
      - RT1
      - RT1-TIPS
      - TIPS
      example: RT1-TIPS
      type: string
    CurrenciesList:
      properties:
        currencyCode:
          allOf:
          - $ref: '#/components/schemas/CurrencyCode'
          description: 'Code of currency.

            Mandatory if the section is present, otherwise XA04 Mandatory field depending
            on the presence of other fields'
        currencyDescr:
          allOf:
          - $ref: '#/components/schemas/CurrencyDescr'
          description: Full description of currency
      required:
      - currencyCode
      type: object
    CurrencyCode:
      example: Euro
      type: string
    CurrencyCode1:
      example: EUR
      maxLength: 3
      type: string
    CurrencyDescr:
      example: CNOR
      type: string
    CurrencyName:
      example: Euro
      maxLength: 32
      type: string
    CurrencyTimestamp:
      example: '2019-06-21T23:20:50.000001'
      type: string
    CurrentPBICCode:
      example: IPSDPF21XXX
      maxLength: 11
      minLength: 8
      type: string
    Date:
      description: Standard ISO Date.
      example: '2019-06-21'
      pattern: '[0-9]{4,4}\-[0-9]{2,2}\-[0-9]{2,2}'
      type: string
    DateOfConfirm:
      example: 6/21/2019
      type: string
    DateOfConfirmFrom:
      example: 6/21/2019
      type: string
    DateOfConfirmTo:
      example: 6/21/2019
      type: string
    DateTime:
      description: Standard ISO Date-Time.
      example: '2019-06-21T23:20:50.000001'
      pattern: '[0-9]{4,4}\-[0-9]{2,2}\-[0-9]{2,2}[T][0-9]{2,2}:[0-9]{2,2}:[0-9]{2,2}(\.[0-9]{1,6}){0,1}'
      type: string
    DateTime1:
      example: '2019-06-21T23:20:50.000001'
      type: string
    Day:
      enum:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      example: 1
      type: integer
    DebSettMethod:
      enum:
      - LQPS
      - RT1A
      - TDCA
      example: LQPS
      type: string
    DebSettMethod1:
      enum:
      - LQPS
      - RT1A
      - TDCA
      example: LQPS
      maxLength: 4
      type: string
    DebtorSettlementMethod:
      enum:
      - LQPS
      - RT1A
      - TDCS
      example: LQPS
      maxLength: 4
      type: string
    DefaultDayValues:
      properties:
        day:
          allOf:
          - $ref: '#/components/schemas/Day'
          description: "The day of the week\n\n **Validation Rule(s)** The value must\
            \ be between 1 and 5 (schema validation)\n1 \u2013 Monday,\n2- Tuesday,\n\
            3 \u2013 Wednesday,\n4 \u2013 Thursday,\n5 \u2013 Friday,\n6- Saturday,\n\
            7- Sunday"
        defaultLACValues:
          description: ' **Validation Rule(s)** This section can be present just one
            time or repeated as many times as the maximum number of LACs in the system.

            This section must be formatted with squared brackets.'
          items:
            $ref: '#/components/schemas/DefaultLACValues'
          type: array
      required:
      - day
      - defaultLACValues
      type: object
    DefaultLACValues:
      properties:
        base:
          allOf:
          - $ref: '#/components/schemas/LacAmount'
          description: "The base value amount\n\n **Validation Rule(s)** Mandatory\
            \ if the section is present.\nIt must be equal or greater than 0 and between\
            \ Lower and Upper (ErrorCode XA05)"
        lac:
          allOf:
          - $ref: '#/components/schemas/LacNumber'
          description: "The number of the LAC for which the values are inquired\n\n\
            \ **Validation Rule(s)** Mandatory if the section is present.\nIt must\
            \ be one of the configured Checkpoint in the system (ErrorCode XA03)\n\
            If the pair Day-LAC is the next one, the request must be received by the\
            \ system before the \u201CLiquidity Agenda Grace Time\u201D\n(ErrorCode\
            \ XA08)"
        lower:
          allOf:
          - $ref: '#/components/schemas/LacAmount'
          description: "The minimum value amount\n\n **Validation Rule(s)** Mandatory\
            \ if the section is present.\nIt must be between 0 and Base (ErrorCode\
            \ XA05)"
        resetToBasePosition:
          allOf:
          - $ref: '#/components/schemas/ResetToBasePosition'
          description: "Whether the participant requests to check/uncheck the \u201C\
            Reset to Base Position\u201D flag for the relevant LAC\n\n **Validation\
            \ Rule(s)** Mandatory if the section is present.\nMust be set with the\
            \ following possible values:\n1=YES\n0=NO, Default if not set in the API"
        sendAccountQueryToTips:
          allOf:
          - $ref: '#/components/schemas/SendAccountQueryToTips'
          description: "Whether the participant requests to check/uncheck the \u201C\
            Send Account Query toTIPS\u201D flag for the relevant LAC\n\n **Validation\
            \ Rule(s)** Mandatory if the section is present.\nMust be set with the\
            \ following possible values:\n1=YES\n0=NO, Default if not set in the API"
        upper:
          allOf:
          - $ref: '#/components/schemas/LacAmount'
          description: "The maximum value amount\n\n **Validation Rule(s)** Mandatory\
            \ if the section is present."
      required:
      - lac
      - base
      - lower
      - upper
      type: object
    DefaultLACValues1:
      properties:
        base:
          allOf:
          - $ref: '#/components/schemas/LacAmount'
          description: The base value amount set in the system for the LSPBic, the
            Day and LAC (Mandatory if this section is present)
        lac:
          allOf:
          - $ref: '#/components/schemas/LacNumber'
          description: The LAC in the system (Mandatory if this section is present)
        lower:
          allOf:
          - $ref: '#/components/schemas/LacAmount'
          description: The minimum value amount set in the system for the LSPBic,
            the Day and LAC (Mandatory if this section is present)
        resetToBasePosition:
          allOf:
          - $ref: '#/components/schemas/ResetToBasePosition'
          description: "Whether the \u201CReset to Base Position\u201D flag for the\
            \ relevant LAC is checked/unchecked.\n The field is present only when\
            \ set to: 1=YES"
        sendAccountQueryToTips:
          allOf:
          - $ref: '#/components/schemas/SendAccountQueryToTips'
