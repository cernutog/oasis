      description: "The ChangeStatusAP request allows the Participant to change the\
        \ status of an AP that it manages in the SCT Inst, to:\n- r-only (\u201CRON\u201D\
        ) if it was a valid AP (enabled) or to\n- Disabled (\u201CDIS\u201D) if it\
        \ was an r-only AP.\nThe positive response contains the ReferenceId of the\
        \ take in charge request for change by the system, but the effective modification\
        \ of the master data has not been executed yet. Application will only take\
        \ place after final authorization of the Dual Control by EBA CLEARING. The\
        \ ReferenceId can be subsequently used in the CommandStatusInquiry request\
        \ to get the status of the submitted command, see ref. 1.1.\nThe negative\
        \ response contains the Code 204 if no record satisfying the set criteria\
        \ is found.\nThe request must anyway be submitted within the \u201CRouting\
        \ Grace Time\u201D, the system parameter that represents the time limit before\
        \ midnight for the Participants to submit requests for updates, otherwise\
        \ it is rejected with ErrorCode XA08.\nThe removal (status set as Disabled)\
        \ can be performed on a non-target day.\n"
