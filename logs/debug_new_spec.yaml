                        bic: IPSDID21
                        sign: D
                        timestamp: '2024-11-08T14:29:00.012345'
                      - amount: 2000.11
                        bic: COURFR2T
                        sign: D
                        timestamp: '2019-06-21T23:20:50.000001'
                    senderPosition:
                      amount: 9.99
                      bic: IPSDID21
                      sign: C
                      timestamp: '2024-11-08T14:29:00.012345'
              schema:
