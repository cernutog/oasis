  /updateParticipant/{senderBic}:
    put:
      description: "The UpdateParticipant request allows a Participant to update its\
        \ configuration in the SCT Inst.\nThe Participant can fill only the new values\
        \ of the configuration elements that have to be changed; elements that are\
        \ not present in the request are not involved in the change and the system\
        \ will keep the existing values for them.\nIf the Participant is an LSP, it\
        \ is allowed to submit a request for change of its Liquidity Management.\n\
        If the Participant is an LP, it is not allowed to change its own Liquidity\
        \ Management parameter.\nThe positive response contains the ReferenceId of\
        \ the take in charge request for change by the system, but the effective modification\
        \ of the master data has not been executed yet. Application will only take\
        \ place after final authorization of the Dual Control by EBA CLEARING. The\
        \ ReferenceId can be subsequently used in the CommandStatusInquiry request\
        \ to get the status of the submitted command, see ref. 1.1.\nThe request must\
        \ anyway be submitted within the \u201CRouting Grace Time\u201D, the system\
        \ parameter that represents the time limit before midnight for the Participants\
        \ to submit requests for updates, otherwise it is rejected with ErrorCode\
        \ XA08.\nThe parameters provided in this API are classified as Critical or\
        \ non-critical, see ref. 10.20\nDepending on the nature of the parameter,\
        \ Critical or Not Critical, checks performed on the effective date change:\n\
        For Critical parameter:\n\u2022 if the command is issued on between Monday\
        \ W1, and Tuesday the first effective date will be the Tuesday of the W3 week\n\
        \u2022 if the command is issued between Tuesday Wednesday and Sunday W1 the\
        \ first effective date will be the Tuesday of the W4\nFor Not Critical parameter:\n\
        \u2022 the effective date must be grater than the current business date, ,\
        \ with respect to the End Validity Date configured for the Participant.\n\
        In case the provisioning operation is inserted without changings (with the\
        \ exception of the Effective Date), the command is rejected with error code\
        \ XA31.\n\n"
      operationId: participant
      parameters:
      - description: "The BIC of the Participant sending the API Request\n\n **Validation\
          \ Rule(s)** It must be equal to the BIC identified through its certificate\
          \ (ErrorCode XA02)\nIt must be an enabled, suspended or R-only Participant\
          \ (ErrorCode PY01)"
