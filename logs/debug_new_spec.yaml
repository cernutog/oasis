  /updateAP/{senderBic}:
    put:
      description: "The UpdateAP request allows the Participant to update the configuration\
        \ of a specific AP that the Participant manages in the SCT Inst.\nThe positive\
        \ response contains the ReferenceId of the take in charge request for change\
        \ by the system, but the effective modification of the master data has not\
        \ been executed yet. Application will only take place after final authorization\
        \ of the Dual Control by EBA CLEARING. The ReferenceId can be subsequently\
        \ used in the CommandStatusInquiry request to get the status of the submitted\
        \ command, see ref. 1.1.\nThe negative response contains the Code 204 if no\
        \ record satisfying the set criteria is found.\nThe request must anyway be\
        \ submitted within the \u201CRouting Grace Time\u201D, the system parameter\
        \ that represents the time limit before midnight for the Participants to submit\
        \ requests for updates, otherwise it is rejected with ErrorCode XA08\nIn case\
        \ the provisioning operation is inserted without changings (with the exception\
        \ of the Effective Date), the command is rejected with error code XA31."
      operationId: UpdateAP
      parameters:
      - description: "The BIC of the Participant sending the API Request\n\n **Validation\
          \ Rule(s)** It must be equal to the BIC identified through its certificate\
          \ (ErrorCode XA02)\nIt must be an enabled, inserted or R-only Participant\
          \ (ErrorCode PY01)"
