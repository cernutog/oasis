          description: "The Settlement Method of the creditor agent.\nPossible values\
            \ are:\n\u2022 \u201CLQPS\u201D (LiQuidity PoSition) \u2013 Clearing intra-RT1\
            \ and, if required, set-tlement with liquidity position;\n\u2022 \u201C\
            RT1A\u201D (RT1 technical Account) \u2013 Clearing cross-systems (e.g.\
            \ RT1-TIPS) and settlement with RT1 AS Technical Account;\n\u2022 TDCA\
            \ (TIPS DCA) \u2013 Clearing cross-systems (e.g. RT1-TIPS) and, if required,\
            \ settlement with TIPS DCA."
        creditorBic:
          allOf:
          - $ref: '#/components/schemas/Bic11'
          description: RT1 BIC whose position will be updated, can be a LP or one
            of his LSPs. (Mandatory if the section is present)
        debSettMethod:
          allOf:
          - $ref: '#/components/schemas/DebSettMethod'
          description: "The Settlement Method of the debtor agent.\nPossible values\
            \ are:\n\u2022 \u201CLQPS\u201D (LiQuidity PoSition) \u2013 Clearing intra-RT1\
            \ and, if required, set-tlement with liquidity position;\n\u2022 \u201C\
            RT1A\u201D (RT1 technical Account) \u2013 Clearing cross-systems (e.g.\
            \ RT1-TIPS) and settlement with RT1 AS Technical Account;\n\u2022 TDCA\
            \ (TIPS DCA) \u2013 Clearing cross-systems (e.g. RT1-TIPS) and, if required,\
            \ settlement with TIPS DCA."
        debtorBic:
          allOf:
          - $ref: '#/components/schemas/Bic11'
          description: The debtor agent of the IP (Mandatory if the section is present)
        endToEndID:
          allOf:
          - $ref: '#/components/schemas/EndToEndID'
          description: The End to End Id (mandatory if section is present).
        instructedBic:
          allOf:
          - $ref: '#/components/schemas/Bic8'
          description: The BIC of the instructed agent of the IP or the BIC of the
            Central System if the transaction was rejected by RT1 without completion
            of the Routing process (Mandatory if the section is present)
        instructingBic:
          allOf:
          - $ref: '#/components/schemas/Bic8'
          description: The instructing agent of the IP (Mandatory if the section is
            present)
        ipStatus:
          allOf:
          - $ref: '#/components/schemas/IpStatus'
          description: "The status of the IP ref. 10.10. The possible values are:\n\
            \u201CPBB\u201D Processed by the Beneficiary Bank\n\u201CRBB\u201D Rejected\
            \ by the Beneficiary Bank\n\u201CRBE\u201D Rejected by EBA\n\u201CPBE\u201D\
            \ Processed by EBA\n\u201CRBC\u201D Rejected by SCT Inst\n\u201CPEN\u201D\
            \ Pending\n\"WTG\" Waiting (only retrieve in-flight non-time critical\
            \ transactions)\n (Mandatory if the section is present)"
        isReceptionDate:
          allOf:
          - $ref: '#/components/schemas/IsReceptionDate'
          description: 'Defines the type of the date return in

            acceptanceReceptionDateTime.

            If isReceptionDate = 0 is the acceptance date and time

            If isReceptionDate = 1 is reception date and time'
        lac:
          allOf:
          - $ref: '#/components/schemas/LacNumber'
          description: The LAC in which the IP was received and processed (Mandatory
            if the section is present)
        productId:
          allOf:
          - $ref: '#/components/schemas/ProductId'
          description: Product of the payment
        reasonCode:
          allOf:
          - $ref: '#/components/schemas/ReasonCode'
          description: "The reason code associated to the status of the IP: it is\
            \ mandatory if the payment was rejected (IPStatus is \u201CRBB\u201D,\
            \ \u201CRBC\u201D or \u201CRBE\u201D), otherwise it is not present"
        transactionId:
          allOf:
          - $ref: '#/components/schemas/TransactionId'
          description: The identification of the original transaction IP (Mandatory
            if the section is present)
