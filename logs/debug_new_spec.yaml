      - csm
      - productId
      type: object
    PaymentDetails1:
      properties:
        acceptanceReceptionDateTime:
          allOf:
          - $ref: '#/components/schemas/ZonedDateTime'
          description: 'The AcceptanceDateTime of the IP (Mandatory if the section
            is present)

            If isReceptionDate is 1 is the transaction reception date

            If isReceptionDate is 0 is the acceptance date and time of the IP'
        amount:
          allOf:
          - $ref: '#/components/schemas/Amount'
          description: The amount of the IP (Mandatory if the section is present)
        credSettMethod:
          allOf:
